<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Notifikasi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="view main-layout active">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="topbar">
                <div class="greeting">
                    <h1 id="user-greeting">Hai, Subekti Rahman</h1>
                    <p>Yuk, selesaikan kegiatan ini dan tetap produktif.</p>
                </div>
                <div class="topbar-actions">
                    <a href="notifikasi.html" class="icon-btn"><i class="fa-regular fa-bell"></i></a>
                    <a href="pengaturan.html" class="user-avatar">
                        <i class="fa-solid fa-circle-user"></i>
                    </a>
                </div>
            </header>

            <div class="content-view active">
                <h1 class="page-title">Notifikasi</h1>
                <p class="page-subtitle">Pemberitahuan terkait tenggat waktu dan prioritas kegiatan Anda.</p>
                
                <div class="notifications-list" id="notifications-list">
                    <!-- Injected by JS -->
                </div>
            </div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="ruleEngine.js"></script>
    <script src="scripting.js"></script>
    <script src="app.js"></script>
    <script src="sidebar.js"></script>
    <script>
        window.injectSidebar('notifications');
        window.updateUserInfo();
        const result = window.initApp();
        const taskData = result.dataTersortir;

        function getPriorityBadge(label) {
            let badgeClass = '';
            switch(label) {
                case 'TERLEWAT':
                    badgeClass = 'badge-terlewat';
                    break;
                case 'Sangat Tinggi':
                    badgeClass = 'badge-red';
                    break;
                case 'Tinggi':
                    badgeClass = 'badge-yellow';
                    break;
                case 'Sedang':
                    badgeClass = 'badge-orange';
                    break;
                default:
                    badgeClass = 'badge-green';
                    break;
            }
            return `<span class="task-badge ${badgeClass}" style="display:inline-block; margin-top:6px;">${label}</span>`;
        }

        function renderNotifications() {
            const list = document.getElementById('notifications-list');
            list.innerHTML = '';
            
            const sortedByUrgency = [...taskData].sort((a, b) => a.tenggatAngka - b.tenggatAngka);
            let count = 0;
            
            sortedByUrgency.forEach(task => {
                if (task.status === "Belum" && count < 5) {
                    let alertClass = "alert-green";
                    let iconClass = "fa-check";
                    let msg = `Kegiatan ${task.nama} dijadwalkan pada ${task.tenggatHari}.`;
                    
                    if (task.labelPrioritas === "TERLEWAT") {
                        alertClass = "alert-terlewat";
                        iconClass = "fa-skull-crossbones";
                        msg = `SANGAT BERBAHAYA! Kegiatan ${task.nama} sudah melewati tenggat waktu!`;
                    } else if (task.labelPrioritas === "Sangat Tinggi" || task.tenggatAngka <= 2) {
                        alertClass = "alert-red";
                        iconClass = "fa-triangle-exclamation";
                        msg = `SEGERA KERJAKAN! ${task.nama} tenggat waktu ${task.tenggatHari} lagi.`;
                    } else if (task.labelPrioritas === "Tinggi" || task.tenggatAngka <= 5) {
                        alertClass = "alert-yellow";
                        iconClass = "fa-clock";
                        msg = `Perhatian, ${task.nama} perlu diselesaikan dalam ${task.tenggatHari}.`;
                    } else if (task.labelPrioritas === "Sedang") {
                        alertClass = "alert-orange";
                        iconClass = "fa-list-check";
                        msg = `${task.nama} prioritas sedang, selesaikan minggu ini.`;
                    }

                    list.innerHTML += `
                        <div class="notification-item ${alertClass}">
                            <div class="notif-icon"><i class="fa-solid ${iconClass}"></i></div>
                            <div class="notif-content">
                                <h4>${task.nama}</h4>
                                <p>${msg}</p>
                                ${getPriorityBadge(task.labelPrioritas)}
                            </div>
                        </div>
                    `;
                    count++;
                }
            });
            
            if (count === 0) {
                list.innerHTML = '<p style="color:var(--text-muted)">Tidak ada notifikasi saat ini.</p>';
            }
        }

        renderNotifications();
    </script>
</body>
</html>
