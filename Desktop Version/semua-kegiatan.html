<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remora - Semua Kegiatan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal-overlay-edit {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay-edit.show {
            display: flex;
        }

        .modal-edit {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            animation: fadeIn 0.25s ease;
        }

        .modal-edit h2 {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .modal-edit .form-group {
            margin-bottom: 14px;
        }

        .modal-edit .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .kebab-menu {
            position: relative;
            display: inline-block;
        }

        .kebab-btn {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .kebab-btn:hover {
            background: #f3f4f6;
            color: var(--text-main);
            border-color: #d1d5db;
        }

        .kebab-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 6px);
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-md);
            min-width: 180px;
            z-index: 100;
            overflow: hidden;
            animation: fadeIn 0.15s ease;
        }

        .kebab-dropdown.show {
            display: block;
        }

        .kebab-dropdown button {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 16px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            transition: background 0.15s ease;
        }

        .kebab-dropdown button:hover {
            background: #f3f4f6;
        }

        .kebab-dropdown button i {
            width: 16px;
            text-align: center;
            font-size: 14px;
        }

        .kebab-dropdown button.action-done i {
            color: var(--primary-dark);
        }

        .kebab-dropdown button.action-done:hover {
            background: #f0fdf4;
        }

        .kebab-dropdown button.action-undo i {
            color: #B45309;
        }

        .kebab-dropdown button.action-undo:hover {
            background: #FFFBEB;
        }

        .kebab-dropdown button.action-review i {
            color: #0284C7;
        }

        .kebab-dropdown button.action-review:hover {
            background: #F0F9FF;
        }

        .kebab-dropdown button.action-edit i {
            color: #1E40AF;
        }

        .kebab-dropdown button.action-delete i {
            color: #991B1B;
        }

        .kebab-dropdown button.action-delete:hover {
            background: #FEF2F2;
        }

        .kebab-divider {
            height: 1px;
            background: var(--border-color);
            margin: 2px 0;
        }

        .filter-dropdown-item {
            display: block;
            width: 100%;
            padding: 10px 20px;
            border: none;
            background: none;
            text-align: left;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.15s;
        }

        .filter-dropdown-item:hover {
            background: #f3f4f6;
        }

        .filter-dropdown-item.active {
            background: #f3f4f6;
            color: var(--primary-dark);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="view main-layout active">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="topbar">
            </header>

            <div class="content-view active">
                <h1 class="page-title">Semua Kegiatan</h1>
                <p class="page-subtitle" style="margin-bottom: 24px; color: var(--text-muted);">Kelola semua tugas kamu.
                </p>

                <div style="display: flex; gap: 16px; margin-bottom: 20px;">
                    <div class="search-bar" style="flex: 1;">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="search-tasks" placeholder="Cari kegiatan..." style="width: 100%;">
                    </div>
                    <div style="position: relative;">
                        <button id="filter-toggle-btn" class="btn btn-primary"
                            style="padding: 0 24px; font-weight: 600; border-radius: 8px; height: 100%;">
                            Filter <i class="fa-solid fa-filter" style="margin-left: 8px;"></i>
                        </button>
                        <div id="filter-dropdown"
                            style="display:none; position:absolute; top:calc(100% + 8px); right:0; background:white; border-radius:var(--radius-md); box-shadow:0 8px 24px rgba(0,0,0,0.15); padding:8px 0; z-index:50; min-width:180px;">
                            <div
                                style="padding: 8px 16px; font-size: 11px; font-weight: 700; color: var(--text-muted);">
                                PRIORITAS</div>
                            <button class="filter-dropdown-item" data-filter="TERLEWAT">TERLEWAT</button>
                            <button class="filter-dropdown-item" data-filter="Sangat Tinggi">Sangat Tinggi</button>
                            <button class="filter-dropdown-item" data-filter="Tinggi">Tinggi</button>
                            <button class="filter-dropdown-item" data-filter="Sedang">Sedang</button>
                            <button class="filter-dropdown-item" data-filter="Rendah">Rendah</button>
                        </div>
                    </div>
                </div>

                <div class="filters-row" id="filter-container" style="margin-bottom: 30px;">
                    <button class="filter-chip active" data-filter="all">All</button>
                    <button class="filter-chip" data-filter="in-progress">In Progress</button>
                    <button class="filter-chip" data-filter="completed">Completed</button>
                    <button class="filter-chip" data-filter="prioritas">Prioritas</button>
                    <button class="filter-chip" data-filter="review">Review</button>
                </div>

                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
                    <strong style="font-size: 16px;">Sort by</strong>
                    <div class="select-wrapper" style="width: 170px; background: white;">
                        <select id="sort-tasks"
                            style="padding: 8px 16px; background: transparent; border: 1px solid var(--border-color); border-radius: 8px; font-weight: 600; width: 100%;">
                            <option value="deadline">Deadline</option>
                            <option value="kesulitan">Tingkat Kesulitan</option>
                            <option value="prioritas">Prioritas</option>
                        </select>
                    </div>
                </div>

                <div id="task-list-container">
                </div>

                <a href="tambah-kegiatan.html"
                    style="position: fixed; bottom: 30px; right: 30px; width: 56px; height: 56px; background: #166534; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; text-decoration: none; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 50;">
                    <i class="fa-solid fa-plus"></i>
                </a>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay-edit" id="edit-modal">
        <div class="modal-edit">
            <h2><i class="fa-solid fa-pen-to-square"></i> Edit Kegiatan</h2>
            <form id="edit-task-form">
                <input type="hidden" id="edit-task-id">
                <div class="form-group">
                    <label>Nama Kegiatan</label>
                    <input type="text" id="edit-task-name" required>
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <div class="select-wrapper">
                        <select id="edit-task-category">
                            <option value="UAS">UAS / UTS</option>
                            <option value="Tugas">Tugas</option>
                            <option value="Ujian">Ujian</option>
                            <option value="Organisasi">Organisasi</option>
                            <option value="Kegiatan eksternal">Kegiatan Eksternal</option>
                        </select>
                    </div>
                </div>
                <div class="form-group row-group">
                    <div class="col">
                        <label>Jenis Kegiatan</label>
                        <div class="select-wrapper">
                            <select id="edit-task-type">
                                <option value="Individu">Individu</option>
                                <option value="Kelompok">Kelompok</option>
                            </select>
                        </div>
                    </div>
                    <div class="col">
                        <label>Tingkat Kesulitan (1-5)</label>
                        <div class="select-wrapper">
                            <select id="edit-task-diff">
                                <option value="1">1 (Sangat Mudah)</option>
                                <option value="2">2 (Mudah)</option>
                                <option value="3">3 (Sedang)</option>
                                <option value="4">4 (Sulit)</option>
                                <option value="5">5 (Sangat Sulit)</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group row-group">
                    <div class="col">
                        <label>Tenggat (hari dari sekarang)</label>
                        <input type="number" id="edit-task-deadline" required>
                    </div>
                    <div class="col">
                        <label>Pernah Terlambat?</label>
                        <div class="select-wrapper">
                            <select id="edit-task-late">
                                <option value="Tidak Pernah">Tidak Pernah</option>
                                <option value="Pernah Terlambat">Pernah Terlambat</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary flex-1"><i class="fa-solid fa-save"></i> Simpan
                        Perubahan</button>
                    <button type="button" class="btn btn-outline" id="btn-cancel-edit"><i class="fa-solid fa-xmark"></i>
                        Batal</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./database/authService.js"></script>
    <script src="./backend_logic/data.js"></script>
    <script src="./backend_logic/ruleEngine.js"></script>
    <script src="./backend_logic/scripting.js"></script>
    <script src="./backend_logic/app.js"></script>
    <script src="./backend_logic/sidebar.js"></script>
    <script>
        window.injectSidebar('all-tasks');
        window.updateUserInfo();

        window.initApp().then(result => {
            const taskData = result.dataTersortir;

            let activeStatusFilter = 'all';



            function renderAllTasks() {
                const container = document.getElementById('task-list-container');
                container.innerHTML = '';

                const searchText = document.getElementById('search-tasks').value.toLowerCase();

                let filtered = taskData.filter(t => {
                    if (searchText && !t.nama.toLowerCase().includes(searchText)) return false;
                    if (activeStatusFilter === 'completed' && t.status !== 'Selesai') return false;
                    if (activeStatusFilter === 'in-progress' && t.status !== 'Belum') return false;
                    if (activeStatusFilter === 'review' && t.status !== 'Review') return false;
                    if (['TERLEWAT', 'Sangat Tinggi', 'Tinggi', 'Sedang', 'Rendah'].includes(activeStatusFilter)) {
                        return t.labelPrioritas === activeStatusFilter;
                    }
                    if (['deadline', 'kesulitan', 'prioritas'].includes(activeStatusFilter) && t.status === 'Selesai') return false;
                    return true;
                });

                const sortBy = document.getElementById('sort-tasks').value;
                filtered.sort((a, b) => {
                    if (sortBy === 'deadline') {
                        return a.tenggatAngka - b.tenggatAngka;
                    } else if (sortBy === 'kesulitan') {
                        return b.tingkatKesulitan - a.tingkatKesulitan;
                    } else if (sortBy === 'prioritas') {
                        return b.skorPrioritas - a.skorPrioritas;
                    }
                    return 0;
                });

                if (filtered.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding: 30px; color: var(--text-muted);">Tidak ada kegiatan yang sesuai.</div>`;
                    return;
                }

                const groups = {
                    'In Progres': filtered.filter(t => t.status === 'Belum'),
                    'Completed': filtered.filter(t => t.status === 'Selesai'),
                    'Review': filtered.filter(t => t.status === 'Review')
                };

                for (const [groupName, tasks] of Object.entries(groups)) {
                    if (tasks.length === 0) continue;

                    let groupHtml = `
                    <div style="margin-bottom: 16px; border: 1px solid var(--border-color); border-radius: 8px; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                        <div style="background: #E5E7EB; padding: 8px 16px; font-size: 12px; font-weight: 700; border-top-left-radius: 7px; border-top-right-radius: 7px;">${groupName}</div>
                        <div>
                `;

                    tasks.forEach((task, index) => {
                        const badgeClass = task.labelPrioritas === 'TERLEWAT' ? 'badge-terlewat' : task.labelPrioritas === 'Sangat Tinggi' ? 'badge-red' : task.labelPrioritas === 'Tinggi' ? 'badge-yellow' : task.labelPrioritas === 'Sedang' ? 'badge-orange' : 'badge-green';
                        const isSelesai = task.status === "Selesai";

                        let actionButton = '';
                        if (task.status === "Selesai") {
                            actionButton = `<button class="action-undo" onclick="window.batalkanTugas(${task.id})"><i class="fa-solid fa-rotate-left"></i> Batalkan</button>`;
                        } else if (task.status === "Review") {
                            actionButton = `
                            <button class="action-done" onclick="window.selesaikanKegiatanTimer(${task.id})"><i class="fa-solid fa-check"></i> Tandai Selesai</button>
                            <button class="action-undo" onclick="window.batalkanTugas(${task.id})"><i class="fa-solid fa-rotate-left"></i> In Progress</button>
                        `;
                        } else {
                            if (task.waktuMulai) {
                                actionButton = `
                                <button class="action-done" onclick="window.selesaikanKegiatanTimer(${task.id})" style="color: var(--primary-dark);"><i class="fa-solid fa-stop"></i> Selesai Mengerjakan</button>
                                <button class="action-review" onclick="window.reviewTugas(${task.id})"><i class="fa-solid fa-eye"></i> Tandai Review</button>
                                `;
                            } else {
                                actionButton = `
                                <button class="action-done" onclick="window.mulaiKegiatan(${task.id})" style="color: var(--primary-color);"><i class="fa-solid fa-play"></i> Mulai Kerjakan</button>
                                <button class="action-done" onclick="window.selesaikanKegiatanTimer(${task.id})"><i class="fa-solid fa-check"></i> Langsung Selesai</button>
                                <button class="action-review" onclick="window.reviewTugas(${task.id})"><i class="fa-solid fa-eye"></i> Tandai Review</button>
                                `;
                            }
                        }

                        let displayTime = task.tenggatHari;
                        if (task.tenggatHari === 'Besok' || task.tenggatHari === 'Hari Ini') {
                            displayTime = '12:00 PM';
                        } else {
                            displayTime = '12:00 PM';
                            displayTime = '12:00 PM';
                        }

                        const borderBottom = index < tasks.length - 1 ? 'border-bottom: 1px solid var(--border-color);' : '';

                        groupHtml += `
                        <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; ${borderBottom}">
                            <div style="flex: 1; opacity: ${isSelesai ? '0.6' : '1'};">
                                <div style="font-weight: 600; font-size: 14px; margin-bottom: 4px; ${isSelesai ? 'text-decoration: line-through;' : ''}">${task.nama}</div>
                                <div style="display: inline-block; background: #F3F4F6; color: #4B5563; font-size: 10px; padding: 2px 6px; border-radius: 4px;">${task.kategori}</div>
                            </div>
                            <div style="flex: 1; text-align: center; color: var(--text-muted); font-size: 12px; opacity: ${isSelesai ? '0.6' : '1'};">
                                12:00 PM
                            </div>
                            <div style="flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 16px;">
                                <span class="task-badge ${badgeClass}" style="margin:0; opacity: ${isSelesai ? '0.6' : '1'};">${task.labelPrioritas}</span>
                                <div class="kebab-menu">
                                    <button class="kebab-btn" style="border: none; background: transparent; width: 24px; height: 24px;" onclick="window.toggleKebab(event, ${task.id})">
                                        <i class="fa-solid fa-ellipsis-vertical" style="font-size: 16px;"></i>
                                    </button>
                                    <div class="kebab-dropdown" id="kebab-${task.id}">
                                        ${actionButton}
                                        <div class="kebab-divider"></div>
                                        <button class="action-edit" onclick="window.editTugas(${task.id})">
                                            <i class="fa-solid fa-pen"></i> Edit Kegiatan
                                        </button>
                                        <button class="action-delete" onclick="window.hapusTugas(${task.id})">
                                            <i class="fa-solid fa-trash"></i> Hapus Kegiatan
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    });
                    groupHtml += `</div></div>`;
                    container.innerHTML += groupHtml;
                }
            }


            renderAllTasks();

            document.getElementById('search-tasks').addEventListener('input', renderAllTasks);
            document.getElementById('sort-tasks').addEventListener('change', renderAllTasks);

            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.addEventListener('click', function () {
                    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');

                    document.querySelectorAll('#filter-dropdown .filter-dropdown-item').forEach(c => c.classList.remove('active'));

                    activeStatusFilter = this.getAttribute('data-filter');
                    renderAllTasks();
                });
            });

            document.getElementById('filter-toggle-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                const fd = document.getElementById('filter-dropdown');
                if (fd) fd.style.display = fd.style.display === 'block' ? 'none' : 'block';
            });

            document.querySelectorAll('#filter-dropdown .filter-dropdown-item').forEach(btn => {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                    document.querySelectorAll('#filter-dropdown .filter-dropdown-item').forEach(c => c.classList.remove('active'));
                    this.classList.add('active');

                    activeStatusFilter = this.getAttribute('data-filter');
                    document.getElementById('filter-dropdown').style.display = 'none';
                    renderAllTasks();
                });
            });

            window.toggleKebab = function (event, taskId) {
                event.stopPropagation();
                document.querySelectorAll('.kebab-dropdown.show').forEach(d => {
                    if (d.id !== 'kebab-' + taskId) d.classList.remove('show');
                });
                const dropdown = document.getElementById('kebab-' + taskId);
                dropdown.classList.toggle('show');
            };

            document.addEventListener('click', () => {
                document.querySelectorAll('.kebab-dropdown.show').forEach(d => d.classList.remove('show'));
                const fd = document.getElementById('filter-dropdown');
                if (fd) fd.style.display = 'none';
            });

            window.selesaikanTugas = async function (taskId) {
                const task = taskData.find(t => t.id === taskId);
                if (!task) return;
                const confirmRes = await window.showCustomModal({ title: "Tandai Selesai", message: `Konfirmasi: Anda yakin "${task.nama}" sudah benar-benar selesai?`, type: "confirm", confirmText: "Ya, Selesai" });
                if (!confirmRes) return;

                try {
                    const supabase = await window.authService.getSupabase();

                    const hariIniStr = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"][new Date().getDay()];

                    const { error } = await supabase
                        .from('kegiatan')
                        .update({
                            status: "Selesai",
                            hari_selesai: hariIniStr
                        })
                        .eq('id', taskId);

                    if (error) throw error;

                    await window.showCustomModal({ title: "Berhasil", message: "Tugas ditandai selesai!", type: "success", confirmText: "OK" });
                    window.location.reload();
                } catch (err) {
                    await window.showCustomModal({ title: "Gagal", message: "Gagal memperbarui status tugas: " + err.message, type: "error", confirmText: "Tutup" });
                    console.error(err);
                }
            };

            window.batalkanTugas = async function (taskId) {
                const task = taskData.find(t => t.id === taskId);
                if (!task) return;

                const confirmRes = await window.showCustomModal({ title: "Batalkan Tugas", message: `Kembalikan kegiatan "${task.nama}" menjadi In Progress?\n\nStatus akan kembali menjadi "Belum".`, type: "confirm", confirmText: "Ya, Kembalikan" });
                if (!confirmRes) return;

                try {
                    const supabase = await window.authService.getSupabase();

                    const { error } = await supabase
                        .from('kegiatan')
                        .update({
                            status: "Belum",
                            hari_selesai: null
                        })
                        .eq('id', taskId);

                    if (error) throw error;

                    await window.showCustomModal({ title: "Berhasil", message: "Status kegiatan dibatalkan menjadi In Progress!", type: "success", confirmText: "OK" });
                    window.location.reload();
                } catch (err) {
                    await window.showCustomModal({ title: "Gagal", message: "Gagal membatalkan status tugas: " + err.message, type: "error", confirmText: "Tutup" });
                    console.error(err);
                }
            };

            window.reviewTugas = async function (taskId) {
                const task = taskData.find(t => t.id === taskId);
                if (!task) return;

                const confirmRes = await window.showCustomModal({ title: "Tandai Review", message: `Tandai kegiatan "${task.nama}" untuk Review?\n\nStatus akan berubah menjadi "Review".`, type: "confirm", confirmText: "Ya, Review" });
                if (!confirmRes) return;

                try {
                    const supabase = await window.authService.getSupabase();

                    const { error } = await supabase
                        .from('kegiatan')
                        .update({
                            status: "Review",
                            hari_selesai: null
                        })
                        .eq('id', taskId);

                    if (error) throw error;

                    await window.showCustomModal({ title: "Berhasil", message: "Tugas ditandai untuk Review!", type: "success", confirmText: "OK" });
                    window.location.reload();
                } catch (err) {
                    await window.showCustomModal({ title: "Gagal", message: "Gagal memperbarui status tugas: " + err.message, type: "error", confirmText: "Tutup" });
                    console.error(err);
                }
            };

            window.editTugas = async function (taskId) {
                document.querySelectorAll('.kebab-dropdown.show').forEach(d => d.classList.remove('show'));

                const currentData = window.taskData || [];
                const task = currentData.find(t => t.id === taskId);
                if (!task) return;

                document.getElementById('edit-task-id').value = task.id;
                document.getElementById('edit-task-name').value = task.nama;
                document.getElementById('edit-task-category').value = task.kategori;
                document.getElementById('edit-task-type').value = task.jenis;
                document.getElementById('edit-task-diff').value = task.tingkatKesulitan;
                document.getElementById('edit-task-deadline').value = task.tenggatAngka;
                document.getElementById('edit-task-late').value = task.riwayatTerlambat;

                document.getElementById('edit-modal').classList.add('show');
            };

            document.getElementById('btn-cancel-edit').addEventListener('click', () => {
                document.getElementById('edit-modal').classList.remove('show');
            });

            document.getElementById('edit-modal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('edit-modal')) {
                    document.getElementById('edit-modal').classList.remove('show');
                }
            });

            document.getElementById('edit-task-form').addEventListener('submit', async (e) => {
                e.preventDefault();

                const taskId = parseInt(document.getElementById('edit-task-id').value);
                const nama = document.getElementById('edit-task-name').value;
                const kategori = document.getElementById('edit-task-category').value;
                const jenisInput = document.getElementById('edit-task-type').value;
                const kesulitanInput = parseInt(document.getElementById('edit-task-diff').value);
                const deadlineInput = parseInt(document.getElementById('edit-task-deadline').value);
                const riwayatInput = document.getElementById('edit-task-late').value;

                try {
                    const supabase = await window.authService.getSupabase();

                    const targetDate = new Date();
                    targetDate.setDate(targetDate.getDate() + deadlineInput);
                    const dateStr = targetDate.toISOString().split('T')[0];

                    const { error } = await supabase
                        .from('kegiatan')
                        .update({
                            nama_kegiatan: nama,
                            kategori: kategori,
                            jenis_kegiatan: jenisInput,
                            tingkat_kesulitan: kesulitanInput,
                            tenggat_waktu: dateStr,
                            pernah_terlambat: riwayatInput
                        })
                        .eq('id', taskId);

                    if (error) throw error;

                    await window.showCustomModal({ title: "Berhasil", message: "Kegiatan berhasil diperbarui!", type: "success", confirmText: "OK" });
                    window.location.reload();
                } catch (err) {
                    await window.showCustomModal({ title: "Gagal", message: "Gagal memperbarui kegiatan: " + err.message, type: "error", confirmText: "Tutup" });
                    console.error(err);
                }
            });

            window.hapusTugas = async function (taskId) {
                document.querySelectorAll('.kebab-dropdown.show').forEach(d => d.classList.remove('show'));

                const task = taskData.find(t => t.id === taskId);
                if (!task) return;
                const confirmRes1 = await window.showCustomModal({ title: "Hapus Kegiatan", message: `Apakah Anda yakin ingin menghapus kegiatan "${task.nama}"?`, type: "confirm", confirmText: "Ya, Hapus" });
                if (!confirmRes1) return;
                const confirmRes2 = await window.showCustomModal({ title: "Peringatan Terakhir", message: `PERINGATAN: Tindakan ini tidak dapat dibatalkan!\n\nHapus "${task.nama}" secara permanen?`, type: "confirm", confirmText: "Ya, Hapus Permanen" });
                if (!confirmRes2) return;

                try {
                    const supabase = await window.authService.getSupabase();

                    const { error } = await supabase
                        .from('kegiatan')
                        .delete()
                        .eq('id', taskId);

                    if (error) throw error;

                    await window.showCustomModal({ title: "Berhasil", message: "Kegiatan berhasil dihapus!", type: "success", confirmText: "OK" });
                    window.location.reload();
                } catch (err) {
                    await window.showCustomModal({ title: "Gagal", message: "Gagal menghapus kegiatan: " + err.message, type: "error", confirmText: "Tutup" });
                    console.error(err);
                }
            };
        });
    </script>
</body>

</html>
