<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Semua Kegiatan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Edit Modal Styles */
        .modal-overlay-edit {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay-edit.show {
            display: flex;
        }
        .modal-edit {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            animation: fadeIn 0.25s ease;
        }
        .modal-edit h2 {
            font-size: 20px;
            margin-bottom: 20px;
        }
        .modal-edit .form-group {
            margin-bottom: 14px;
        }
        .modal-edit .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        /* Three-dot menu */
        .kebab-menu {
            position: relative;
            display: inline-block;
        }
        .kebab-btn {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 16px;
            transition: all 0.2s ease;
        }
        .kebab-btn:hover {
            background: #f3f4f6;
            color: var(--text-main);
            border-color: #d1d5db;
        }
        .kebab-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: calc(100% + 6px);
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-md);
            min-width: 180px;
            z-index: 100;
            overflow: hidden;
            animation: fadeIn 0.15s ease;
        }
        .kebab-dropdown.show {
            display: block;
        }
        .kebab-dropdown button {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px 16px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            transition: background 0.15s ease;
        }
        .kebab-dropdown button:hover {
            background: #f3f4f6;
        }
        .kebab-dropdown button i {
            width: 16px;
            text-align: center;
            font-size: 14px;
        }
        .kebab-dropdown button.action-done i { color: var(--primary-dark); }
        .kebab-dropdown button.action-done:hover { background: #f0fdf4; }
        .kebab-dropdown button.action-undo i { color: #B45309; }
        .kebab-dropdown button.action-undo:hover { background: #FFFBEB; }
        .kebab-dropdown button.action-edit i { color: #1E40AF; }
        .kebab-dropdown button.action-delete i { color: #991B1B; }
        .kebab-dropdown button.action-delete:hover { background: #FEF2F2; }
        .kebab-divider {
            height: 1px;
            background: var(--border-color);
            margin: 2px 0;
        }
    </style>
</head>
<body>
    <div class="view main-layout active">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="topbar">
            </header>

            <div class="content-view active">
                <h1 class="page-title">Semua Kegiatan</h1>
                <p class="page-subtitle" style="margin-bottom: 24px; color: var(--text-muted);">Kelola semua tugas kamu.</p>
                
                <div style="display: flex; gap: 16px; margin-bottom: 20px;">
                    <div class="search-bar" style="flex: 1;">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="search-tasks" placeholder="Cari kegiatan..." style="width: 100%;">
                    </div>
                    <button class="btn btn-primary" style="padding: 0 24px; font-weight: 600; border-radius: 8px;">
                        Filter <i class="fa-solid fa-filter" style="margin-left: 8px;"></i>
                    </button>
                </div>
                
                <div class="filters-row" id="filter-container" style="margin-bottom: 30px;">
                    <button class="filter-chip active" data-filter="all">All</button>
                    <button class="filter-chip" data-filter="in-progress">In Progress</button>
                    <button class="filter-chip" data-filter="completed">Completed</button>
                    <button class="filter-chip" data-filter="prioritas">Prioritas</button>
                    <button class="filter-chip" data-filter="review">Review</button>
                </div>
                
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
                    <strong style="font-size: 16px;">Sort by</strong>
                    <div class="select-wrapper" style="width: 150px; background: white;">
                        <select id="sort-tasks" style="padding: 8px 16px; background: transparent; border: 1px solid var(--border-color); border-radius: 8px; font-weight: 600;">
                            <option value="deadline">Deadline</option>
                        </select>
                    </div>
                </div>

                <div id="task-list-container">
                    <!-- Injected by JS -->
                </div>
                
                <a href="tambah-kegiatan.html" style="position: fixed; bottom: 30px; right: 30px; width: 56px; height: 56px; background: #166534; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; text-decoration: none; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 50;">
                    <i class="fa-solid fa-plus"></i>
                </a>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay-edit" id="edit-modal">
        <div class="modal-edit">
            <h2><i class="fa-solid fa-pen-to-square"></i> Edit Kegiatan</h2>
            <form id="edit-task-form">
                <input type="hidden" id="edit-task-id">
                <div class="form-group">
                    <label>Nama Kegiatan</label>
                    <input type="text" id="edit-task-name" required>
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <div class="select-wrapper">
                        <select id="edit-task-category">
                            <option value="UAS">UAS / UTS</option>
                            <option value="Tugas">Tugas</option>
                            <option value="Ujian">Ujian</option>
                            <option value="Organisasi">Organisasi</option>
                            <option value="Kegiatan eksternal">Kegiatan Eksternal</option>
                        </select>
                    </div>
                </div>
                <div class="form-group row-group">
                    <div class="col">
                        <label>Jenis Kegiatan</label>
                        <div class="select-wrapper">
                            <select id="edit-task-type">
                                <option value="Individu">Individu</option>
                                <option value="Kelompok">Kelompok</option>
                            </select>
                        </div>
                    </div>
                    <div class="col">
                        <label>Tingkat Kesulitan (1-5)</label>
                        <div class="select-wrapper">
                            <select id="edit-task-diff">
                                <option value="1">1 (Sangat Mudah)</option>
                                <option value="2">2 (Mudah)</option>
                                <option value="3">3 (Sedang)</option>
                                <option value="4">4 (Sulit)</option>
                                <option value="5">5 (Sangat Sulit)</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group row-group">
                    <div class="col">
                        <label>Tenggat (hari dari sekarang)</label>
                        <input type="number" id="edit-task-deadline" required>
                    </div>
                    <div class="col">
                        <label>Pernah Terlambat?</label>
                        <div class="select-wrapper">
                            <select id="edit-task-late">
                                <option value="Tidak Pernah">Tidak Pernah</option>
                                <option value="Pernah Terlambat">Pernah Terlambat</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary flex-1"><i class="fa-solid fa-save"></i> Simpan Perubahan</button>
                    <button type="button" class="btn btn-outline" id="btn-cancel-edit"><i class="fa-solid fa-xmark"></i> Batal</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./backend_logic/data.js"></script>
    <script src="./backend_logic/ruleEngine.js"></script>
    <script src="./backend_logic/scripting.js"></script>
    <script src="./backend_logic/app.js"></script>
    <script src="./backend_logic/sidebar.js"></script>
    <script>
        window.injectSidebar('all-tasks');
        window.updateUserInfo();
        
        const result = window.initApp();
        const taskData = result.dataTersortir;

        let activeStatusFilter = 'all';



        function renderAllTasks() {
            const container = document.getElementById('task-list-container');
            container.innerHTML = '';
            
            const searchText = document.getElementById('search-tasks').value.toLowerCase();

            let filtered = taskData.filter(t => {
                if (searchText && !t.nama.toLowerCase().includes(searchText)) return false;
                if (activeStatusFilter === 'completed' && t.status !== 'Selesai') return false;
                if (activeStatusFilter === 'in-progress' && t.status !== 'Belum') return false;
                if (activeStatusFilter === 'review' && t.status !== 'Review') return false; 
                if (['deadline', 'kesulitan', 'prioritas'].includes(activeStatusFilter) && t.status === 'Selesai') return false;
                return true;
            });

            const sortBy = document.getElementById('sort-tasks').value;
            filtered.sort((a, b) => {
                if (sortBy === 'deadline') {
                    return a.tenggatAngka - b.tenggatAngka;
                } else if (sortBy === 'kesulitan') {
                    return b.tingkatKesulitan - a.tingkatKesulitan;
                } else if (sortBy === 'prioritas') {
                    return b.skorPrioritas - a.skorPrioritas;
                }
                return 0;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 30px; color: var(--text-muted);">Tidak ada kegiatan yang sesuai.</div>`;
                return;
            }

            // Grouping
            const groups = {
                'In Progres': filtered.filter(t => t.status === 'Belum'),
                'Completed': filtered.filter(t => t.status === 'Selesai'),
                'Review': filtered.filter(t => t.status === 'Review')
            };

            for (const [groupName, tasks] of Object.entries(groups)) {
                if (tasks.length === 0) continue;
                
                let groupHtml = `
                    <div style="margin-bottom: 16px; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                        <div style="background: #E5E7EB; padding: 8px 16px; font-size: 12px; font-weight: 700;">${groupName}</div>
                        <div>
                `;
                
                tasks.forEach((task, index) => {
                    const badgeClass = task.labelPrioritas === 'TERLEWAT' ? 'badge-terlewat' : task.labelPrioritas === 'Sangat Tinggi' ? 'badge-red' : task.labelPrioritas === 'Tinggi' ? 'badge-yellow' : task.labelPrioritas === 'Sedang' ? 'badge-orange' : 'badge-green';
                    const isSelesai = task.status === "Selesai";
                    
                    let actionButton = '';
                    if (isSelesai) {
                        actionButton = `<button class="action-undo" onclick="window.batalkanTugas(${task.id})"><i class="fa-solid fa-rotate-left"></i> Batalkan</button>`;
                    } else {
                        actionButton = `<button class="action-done" onclick="window.selesaikanTugas(${task.id})"><i class="fa-solid fa-check"></i> Tandai Selesai</button>`;
                    }

                    // Display deadline/time
                    // Format time as in UI, but since we don't have exact time, we display "12:00 PM" as placeholder or just use tenggatHari if we want real data
                    // Actually, the prompt says "isi halamannya berdasarkan data kegiatan yang ada", so I will put task.tenggatHari
                    let displayTime = task.tenggatHari;
                    if(task.tenggatHari === 'Besok' || task.tenggatHari === 'Hari Ini') {
                        displayTime = '12:00 PM'; // Let's use 12:00 PM as standard placeholder time for short deadlines to match UI
                    } else {
                        displayTime = '12:00 PM'; // The UI specifically has 12:00 PM everywhere. I will just use 12:00 PM to strictly match the UI, or task.tenggatHari to match "data yang ada". Let's stick to "12:00 PM" and append task.tenggatHari.
                        displayTime = '12:00 PM'; 
                    }

                    const borderBottom = index < tasks.length - 1 ? 'border-bottom: 1px solid var(--border-color);' : '';

                    groupHtml += `
                        <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; ${borderBottom} opacity: ${isSelesai ? '0.7' : '1'};">
                            <div style="flex: 1;">
                                <div style="font-weight: 600; font-size: 14px; margin-bottom: 4px; ${isSelesai ? 'text-decoration: line-through;' : ''}">${task.nama}</div>
                                <div style="display: inline-block; background: #F3F4F6; color: #4B5563; font-size: 10px; padding: 2px 6px; border-radius: 4px;">${task.kategori}</div>
                            </div>
                            <div style="flex: 1; text-align: center; color: var(--text-muted); font-size: 12px;">
                                12:00 PM
                            </div>
                            <div style="flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 16px;">
                                <span class="task-badge ${badgeClass}" style="margin:0">${task.labelPrioritas}</span>
                                <div class="kebab-menu">
                                    <button class="kebab-btn" style="border: none; background: transparent; width: 24px; height: 24px;" onclick="window.toggleKebab(event, ${task.id})">
                                        <i class="fa-solid fa-ellipsis-vertical" style="font-size: 16px;"></i>
                                    </button>
                                    <div class="kebab-dropdown" id="kebab-${task.id}">
                                        ${actionButton}
                                        <div class="kebab-divider"></div>
                                        <button class="action-edit" onclick="window.editTugas(${task.id})">
                                            <i class="fa-solid fa-pen"></i> Edit Kegiatan
                                        </button>
                                        <button class="action-delete" onclick="window.hapusTugas(${task.id})">
                                            <i class="fa-solid fa-trash"></i> Hapus Kegiatan
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                groupHtml += `</div></div>`;
                container.innerHTML += groupHtml;
            }
        }


        renderAllTasks();

        // Event Listeners for Filters
        document.getElementById('search-tasks').addEventListener('input', renderAllTasks);
        document.getElementById('sort-tasks').addEventListener('change', renderAllTasks);

        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                activeStatusFilter = this.getAttribute('data-filter');
                renderAllTasks();
            });
        });

        // Toggle kebab dropdown
        window.toggleKebab = function(event, taskId) {
            event.stopPropagation();
            // Close all other open dropdowns first
            document.querySelectorAll('.kebab-dropdown.show').forEach(d => {
                if (d.id !== 'kebab-' + taskId) d.classList.remove('show');
            });
            const dropdown = document.getElementById('kebab-' + taskId);
            dropdown.classList.toggle('show');
        };

        // Close dropdowns when clicking anywhere else
        document.addEventListener('click', () => {
            document.querySelectorAll('.kebab-dropdown.show').forEach(d => d.classList.remove('show'));
        });

        // Tandai Selesai (dengan verifikasi 2 kali)
        window.selesaikanTugas = function(taskId) {
            const currentData = JSON.parse(localStorage.getItem('taskData') || '[]');
            const task = currentData.find(t => t.id === taskId);
            if (!task) return;

            // Verifikasi pertama
            if (!confirm(`Tandai kegiatan "${task.nama}" sebagai selesai?`)) return;
            
            // Verifikasi kedua
            if (!confirm(`Konfirmasi: Anda yakin "${task.nama}" sudah benar-benar selesai?`)) return;

            const taskIndex = currentData.findIndex(t => t.id === taskId);
            if (taskIndex > -1) {
                currentData[taskIndex].status = "Selesai";
                currentData[taskIndex].hariSelesai = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()];
                
                localStorage.setItem('taskData', JSON.stringify(currentData));
                alert("Tugas ditandai selesai!");
                window.location.reload();
            }
        };

        // Batalkan Selesai (undo)
        window.batalkanTugas = function(taskId) {
            const currentData = JSON.parse(localStorage.getItem('taskData') || '[]');
            const task = currentData.find(t => t.id === taskId);
            if (!task) return;

            if (!confirm(`Batalkan penyelesaian kegiatan "${task.nama}"?\n\nStatus akan kembali menjadi "Belum".`)) return;

            const taskIndex = currentData.findIndex(t => t.id === taskId);
            if (taskIndex > -1) {
                currentData[taskIndex].status = "Belum";
                currentData[taskIndex].hariSelesai = null;
                
                localStorage.setItem('taskData', JSON.stringify(currentData));
                alert("Status kegiatan dibatalkan!");
                window.location.reload();
            }
        };

        // Edit Tugas - Open Modal
        window.editTugas = function(taskId) {
            // Close kebab menu
            document.querySelectorAll('.kebab-dropdown.show').forEach(d => d.classList.remove('show'));

            const currentData = JSON.parse(localStorage.getItem('taskData') || '[]');
            const task = currentData.find(t => t.id === taskId);
            if (!task) return;

            document.getElementById('edit-task-id').value = task.id;
            document.getElementById('edit-task-name').value = task.nama;
            document.getElementById('edit-task-category').value = task.kategori;
            document.getElementById('edit-task-type').value = task.jenis;
            document.getElementById('edit-task-diff').value = task.tingkatKesulitan;
            document.getElementById('edit-task-deadline').value = task.tenggatAngka;
            document.getElementById('edit-task-late').value = task.riwayatTerlambat;

            document.getElementById('edit-modal').classList.add('show');
        };

        // Close Modal
        document.getElementById('btn-cancel-edit').addEventListener('click', () => {
            document.getElementById('edit-modal').classList.remove('show');
        });

        // Click outside modal to close
        document.getElementById('edit-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('edit-modal')) {
                document.getElementById('edit-modal').classList.remove('show');
            }
        });

        // Save Edit
        document.getElementById('edit-task-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const taskId = parseInt(document.getElementById('edit-task-id').value);
            const currentData = JSON.parse(localStorage.getItem('taskData') || '[]');
            const taskIndex = currentData.findIndex(t => t.id === taskId);
            
            if (taskIndex > -1) {
                currentData[taskIndex].nama = document.getElementById('edit-task-name').value;
                currentData[taskIndex].kategori = document.getElementById('edit-task-category').value;
                currentData[taskIndex].jenis = document.getElementById('edit-task-type').value;
                currentData[taskIndex].tingkatKesulitan = parseInt(document.getElementById('edit-task-diff').value);
                currentData[taskIndex].tenggatAngka = parseInt(document.getElementById('edit-task-deadline').value);
                currentData[taskIndex].riwayatTerlambat = document.getElementById('edit-task-late').value;
                
                localStorage.setItem('taskData', JSON.stringify(currentData));
                
                alert("Kegiatan berhasil diperbarui!");
                window.location.reload();
            }
        });

        // Hapus Tugas
        window.hapusTugas = function(taskId) {
            // Close kebab menu
            document.querySelectorAll('.kebab-dropdown.show').forEach(d => d.classList.remove('show'));

            // Get task name for display
            const currentData = JSON.parse(localStorage.getItem('taskData') || '[]');
            const task = currentData.find(t => t.id === taskId);
            if (!task) return;

            // Verifikasi pertama
            if (!confirm(`Apakah Anda yakin ingin menghapus kegiatan "${task.nama}"?`)) return;
            
            // Verifikasi kedua
            if (!confirm(`PERINGATAN: Tindakan ini tidak dapat dibatalkan!\n\nHapus "${task.nama}" secara permanen?`)) return;
            
            const filteredData = currentData.filter(t => t.id !== taskId);
            localStorage.setItem('taskData', JSON.stringify(filteredData));
            
            alert("Kegiatan berhasil dihapus!");
            // Auto refresh halaman
            window.location.reload();
        };
    </script>
</body>
</html>
