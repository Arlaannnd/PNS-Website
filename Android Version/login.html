<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .view { scrollbar-width: none; -ms-overflow-style: none; }
        .view::-webkit-scrollbar { display: none; }
        .auth-body .form-group input,
        .auth-body .form-group .input-with-icon input {
            border-radius: 24px;
            padding: 14px 20px;
            border: 1px solid #E5E7EB;
            background: white;
        }
        .auth-body .input-with-icon input {
            padding-right: 48px;
        }
        .auth-body .input-with-icon i {
            right: 20px;
        }
        .auth-body .btn-primary {
            border-radius: var(--radius-sm);
            padding: 16px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="view active" style="overflow-y: auto;">
        <div class="auth-container" style="display: block; height: auto; min-height: 100%;">
            <div class="auth-header">
                <div class="logo">
                    <div style="display:inline-block; position:relative; width:70px; height:70px;">
                        <div style="width:70px;height:70px;border:4px solid var(--primary-light);border-radius:50%;display:flex;align-items:center;justify-content:center;">
                            <i class="fa-solid fa-check" style="font-size:32px;color:white;"></i>
                        </div>
                    </div>
                    <h1>TaskFlow</h1>
                    <p>Kelola Produktivitas Lebih Cerdas</p>
                </div>
            </div>
            <div class="auth-body" style="position: relative; overflow: visible;">
                <div class="auth-form-container" style="position: relative; z-index: 2;">
                    <h2>Selamat Datang</h2>
                    <p class="subtitle">Masuk untuk melanjutkan<br>pengelolaan kegiatan Anda.</p>
                    
                    <form action="dashboard.html">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="login-email" placeholder="contoh@gmail.com" pattern=".+@.+\.com$" title="Email harus menggunakan domain .com" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <div class="input-with-icon">
                                <input type="password" placeholder="Masukkan password" required>
                                <i class="fa-solid fa-eye show-pwd" style="cursor:pointer;"></i>
                            </div>
                        </div>
                        <div style="text-align:right; margin-bottom:24px;">
                            <a href="#" style="font-size:12px; color:var(--primary-light); font-weight: 600;">Lupa password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Masuk</button>
                    </form>
                    
                    <p style="text-align:center; font-size:12px; margin-top:24px; color:var(--text-muted);">Belum punya akun?</p>
                    <div style="text-align:center; margin-top:10px;">
                        <a href="register.html" style="font-size:14px; color:var(--primary-light); font-weight:700;">Daftar Sekarang</a>
                    </div>
                </div>
                
                <!-- Decorative icons as background (behind all content) -->
                <div style="position: relative; width: 100%; display:flex; justify-content:space-around; align-items:flex-end; opacity:0.15; color:#5f8a22; pointer-events:none; z-index: 0; margin-top: 30px; padding-bottom: 20px;">
                    <i class="fa-solid fa-bell" style="font-size: 40px; transform: rotate(-15deg); margin-bottom: 20px;"></i>
                    <i class="fa-solid fa-table-cells-large" style="font-size: 80px; transform: rotate(15deg);"></i>
                    <i class="fa-solid fa-file-circle-plus" style="font-size: 50px; transform: rotate(10deg); margin-bottom: 30px;"></i>
                    <i class="fa-solid fa-chart-line" style="font-size: 60px; transform: rotate(-10deg); margin-bottom: 10px;"></i>
                </div>
            </div>
        </div>
    </div>
    <script>
        // Toggle password visibility
        document.querySelector('.show-pwd').addEventListener('click', function() {
            const input = this.previousElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                this.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                this.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // Form submission with @gmail.com validation
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            if (!email.endsWith('.com')) {
                alert('Email harus menggunakan domain .com');
                return;
            }
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
