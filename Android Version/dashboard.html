<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="view main-layout active">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <a href="pengaturan.html" class="user-avatar" id="topbar-avatar-link">
                        <i class="fa-solid fa-circle-user" id="topbar-avatar-icon"></i>
                        <img id="topbar-avatar-img" src="" alt="Avatar"
                            style="width:48px; height:48px; border-radius:50%; object-fit:cover; display:none; border: 2px solid rgba(255,255,255,0.4);">
                    </a>
                    <div class="greeting">
                        <h1 id="user-greeting">Hai, Subekti Rahman</h1>
                        <p>Yuk, selesaikan kegiatan ini dan tetap produktif.</p>
                    </div>
                </div>
                <div class="topbar-actions">
                    <a href="notifikasi.html" class="icon-btn-bell">
                        <i class="fa-regular fa-bell"></i>
                        <span class="notification-dot"></span>
                    </a>
                </div>
            </header>

            <div class="content-view active dashboard-content">
                <div class="calendar-card">
                    <div class="calendar-header">
                        <h3>Kamu memiliki <span id="task-count">0</span> tugas hari ini.</h3>
                        <button class="next-week" id="btn-next-week"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <div class="week-days" id="week-days">
                        <!-- Injected by JS -->
                    </div>
                </div>

                <!-- Slide-up Day Task Panel -->
                <div id="day-panel-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; transition:opacity 0.3s;"
                    onclick="closeDayPanel()"></div>
                <div id="day-panel" style="display:none; position:fixed; bottom:0; left:0; right:0; background:white; border-radius:24px 24px 0 0; z-index:201; padding:20px 24px 100px; max-height:65vh; overflow-y:auto; transition:transform 0.35s cubic-bezier(0.4,0,0.2,1); transform:translateY(100%);">
                    <div style="width:40px; height:4px; background:#e5e7eb; border-radius:2px; margin:0 auto 16px;"></div>
                    <h3 id="day-panel-title" style="font-size:16px; font-weight:700; margin-bottom:4px;">Tugas</h3>
                    <p id="day-panel-date" style="font-size:12px; color:var(--text-muted); margin-bottom:16px;"></p>
                    <div id="day-panel-tasks" style="display:flex; flex-direction:column; gap:10px;"></div>
                </div>

                <div class="dashboard-grid">
                    <div class="tasks-section">
                        <div class="section-header">
                            <h3>Tugas Mendatang</h3>
                            <a href="semua-kegiatan.html">See All</a>
                        </div>
                        <div class="task-list" id="upcoming-tasks-list">
                            <!-- Injected by JS -->
                        </div>
                    </div>

                    <div class="stats-section">
                        <h3 class="section-title">Progress Hari Ini</h3>
                        <div class="stat-card">
                            <div class="progress-content"
                                style="display: flex; align-items: center; gap: 16px; width: 100%;">
                                <div class="circular-progress">
                                    <svg viewBox="0 0 36 36" class="circular-chart green">
                                        <path class="circle-bg"
                                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                        <path class="circle" stroke-dasharray="75, 100"
                                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                        <text x="18" y="21" class="percentage"
                                            style="font-weight: 700; font-size: 10px; fill: #000; text-anchor: middle;">75%</text>
                                    </svg>
                                </div>
                                <div class="progress-text">
                                    <h4 style="color: var(--primary-dark); font-size: 13px; font-weight: 700;">Progress
                                        Yang Baik!</h4>
                                    <p style="color: var(--text-muted); font-size: 12px; margin-top: 4px;">Kamu
                                        menyelesaikan 0 dari 0 tugas.</p>
                                </div>
                            </div>
                        </div>

                        <!-- Ringkasan Prioritas (Hidden to match image if not needed, but keep it if part of original) -->
                        <div class="stat-card" style="display: none;">
                            <h3>Ringkasan Prioritas</h3>
                            <div class="priority-summary">
                                <div class="legend">
                                    <div class="legend-item"><span class="dot red"></span>Sangat Tinggi <span
                                            id="pt-sangat-tinggi">0%</span></div>
                                    <div class="legend-item"><span class="dot yellow"></span>Tinggi <span
                                            id="pt-tinggi">0%</span></div>
                                    <div class="legend-item"><span class="dot orange"></span>Sedang <span
                                            id="pt-sedang">0%</span></div>
                                    <div class="legend-item"><span class="dot green"></span>Normal <span
                                            id="pt-normal">0%</span></div>
                                </div>
                                <div class="donut-chart-container">
                                    <div class="donut-chart" id="dashboard-donut-chart">
                                        <div class="center-text">
                                            <strong id="total-tasks-stat">0</strong>
                                            <span>Total Tugas</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>


            </div>
        </main>
    </div>

    <script src="./database/authService.js"></script>
    <script src="./backend_logic/data.js"></script>
    <script src="./backend_logic/ruleEngine.js"></script>
    <script src="./backend_logic/scripting.js"></script>
    <script src="./backend_logic/app.js"></script>
    <script src="./backend_logic/sidebar.js"></script>
    <script>
        window.injectSidebar('dashboard');

        // Sinkronisasi foto avatar dari localStorage
        const storedAvatar = localStorage.getItem('userAvatar');
        if (storedAvatar) {
            const avatarIcon = document.getElementById('topbar-avatar-icon');
            const avatarImg = document.getElementById('topbar-avatar-img');
            if (avatarIcon) avatarIcon.style.display = 'none';
            if (avatarImg) { avatarImg.src = storedAvatar; avatarImg.style.display = 'block'; }
        }

        window.authService.getSession().then(({session}) => {
            if (session && session.user && session.user.app_metadata && session.user.app_metadata.provider === 'google') {
                const email = session.user.email;
                const firstName = email.split('@')[0];
                const currentName = localStorage.getItem('userName');
                
                if (!currentName || currentName === 'Subekti Rahman' || localStorage.getItem('userEmail') !== email) {
                    localStorage.setItem('userName', firstName);
                    localStorage.setItem('userNickname', firstName);
                    localStorage.setItem('userEmail', email);
                }
            }
            window.updateUserInfo();
        });

        // Fungsi panel hari
        function openDayPanel(dateObj, tasks) {
            const dayNames = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
            const monthNames = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
            document.getElementById('day-panel-title').textContent = `${dayNames[dateObj.getDay()]}, ${dateObj.getDate()} ${monthNames[dateObj.getMonth()]} ${dateObj.getFullYear()}`;
            document.getElementById('day-panel-date').textContent = tasks.length > 0 ? `${tasks.length} tugas memiliki deadline hari ini` : 'Tidak ada tugas pada hari ini';

            const container = document.getElementById('day-panel-tasks');
            container.innerHTML = '';
            if (tasks.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted); text-align:center; padding:20px 0;">🎉 Tidak ada tugas untuk hari ini!</p>';
            } else {
                tasks.forEach(task => {
                    const priorityClass = task.labelPrioritas === 'TERLEWAT' ? 'priority-terlewat' : task.labelPrioritas === 'Sangat Tinggi' ? 'priority-sangat-tinggi' : task.labelPrioritas === 'Tinggi' ? 'priority-tinggi' : task.labelPrioritas === 'Sedang' ? 'priority-sedang' : 'priority-normal';
                    const badgeClass = task.labelPrioritas === 'TERLEWAT' ? 'badge-terlewat' : task.labelPrioritas === 'Sangat Tinggi' ? 'badge-red' : task.labelPrioritas === 'Tinggi' ? 'badge-yellow' : task.labelPrioritas === 'Sedang' ? 'badge-orange' : 'badge-green';
                    container.innerHTML += `
                        <div class="task-card ${priorityClass}">
                            <h4>${task.nama}</h4>
                            <span class="task-cat">${task.kategori}</span>
                            <div class="task-card-footer">
                                <span class="task-time">${task.tenggatHari || '-'}</span>
                                <span class="task-badge ${badgeClass}">${task.labelPrioritas}</span>
                            </div>
                        </div>
                    `;
                });
            }

            const overlay = document.getElementById('day-panel-overlay');
            const panel = document.getElementById('day-panel');
            overlay.style.display = 'block';
            panel.style.display = 'block';
            requestAnimationFrame(() => {
                overlay.style.opacity = '1';
                panel.style.transform = 'translateY(0)';
            });
        }

        window.closeDayPanel = function() {
            const overlay = document.getElementById('day-panel-overlay');
            const panel = document.getElementById('day-panel');
            panel.style.transform = 'translateY(100%)';
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                panel.style.display = 'none';
            }, 350);
        };

        window.initApp().then(result => {
            const taskData = result.dataTersortir;
            const statsData = result.hasilStatistik;

            const now = new Date();
            const dayNamesShort = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

            // 1. Kalender interaktif
            const weekContainer = document.getElementById('week-days');
            if (weekContainer) {
                weekContainer.innerHTML = '';
                const currentDay = now.getDay();
                const startOfWeek = new Date(now);
                startOfWeek.setDate(now.getDate() - ((currentDay + 6) % 7));

                // Hitung tanggal deadline setiap tugas (yang belum selesai)
                const taskDeadlineMap = {}; // key: 'YYYY-MM-DD' → array of tasks
                taskData.forEach(task => {
                    if (task.status === 'Selesai') return;
                    const deadlineDate = new Date(now);
                    deadlineDate.setDate(now.getDate() + (task.tenggatAngka || 0));
                    deadlineDate.setHours(0,0,0,0);
                    const key = deadlineDate.toISOString().slice(0,10);
                    if (!taskDeadlineMap[key]) taskDeadlineMap[key] = [];
                    taskDeadlineMap[key].push(task);
                });

                for (let i = 0; i < 7; i++) {
                    const d = new Date(startOfWeek);
                    d.setDate(startOfWeek.getDate() + i);
                    const isToday = d.toDateString() === now.toDateString();
                    const key = d.toISOString().slice(0,10);
                    const dayTasks = taskDeadlineMap[key] || [];
                    const hasTasks = dayTasks.length > 0;

                    const el = document.createElement('div');
                    el.className = `day-item ${isToday ? 'active' : ''}`;
                    el.style.cursor = 'pointer';
                    el.innerHTML = `
                        <span>${dayNamesShort[d.getDay()]}</span>
                        <strong>${d.getDate()}</strong>
                        ${hasTasks ? `<span style="width:6px; height:6px; background:${isToday ? 'white' : 'var(--primary-light)'}; border-radius:50%; display:inline-block; margin-top:2px;"></span>` : '<span style="width:6px; height:6px; display:inline-block;"></span>'}
                    `;
                    el.addEventListener('click', () => {
                        // Highlight selected day
                        document.querySelectorAll('#week-days .day-item').forEach(x => x.classList.remove('selected'));
                        el.classList.add('selected');
                        openDayPanel(d, dayTasks);
                    });
                    weekContainer.appendChild(el);
                }
            }

            // Tombol next week
            document.getElementById('btn-next-week')?.addEventListener('click', () => {
                window.location.href = 'semua-kegiatan.html';
            });

            // 2. Render Tugas
            const belumTasks = taskData.filter(t => t.status !== 'Selesai');
            const taskCountEl = document.getElementById('task-count');
            if (taskCountEl) taskCountEl.textContent = belumTasks.length;

            const tasksList = document.getElementById('upcoming-tasks-list');
            if (tasksList) {
                tasksList.innerHTML = '';
                belumTasks.slice(0, 3).forEach(task => {
                    const priorityClass = task.labelPrioritas === 'TERLEWAT' ? 'priority-terlewat' : task.labelPrioritas === 'Sangat Tinggi' ? 'priority-sangat-tinggi' : task.labelPrioritas === 'Tinggi' ? 'priority-tinggi' : task.labelPrioritas === 'Sedang' ? 'priority-sedang' : 'priority-normal';
                    const badgeClass = task.labelPrioritas === 'TERLEWAT' ? 'badge-terlewat' : task.labelPrioritas === 'Sangat Tinggi' ? 'badge-red' : task.labelPrioritas === 'Tinggi' ? 'badge-yellow' : task.labelPrioritas === 'Sedang' ? 'badge-orange' : 'badge-green';

                    tasksList.innerHTML += `
                        <div class="task-card ${priorityClass}">
                            <h4>${task.nama}</h4>
                            <span class="task-cat">${task.kategori}</span>
                            <div class="task-card-footer">
                                <span class="task-time">${task.tenggatHari}</span>
                                <span class="task-badge ${badgeClass}">${task.labelPrioritas}</span>
                            </div>
                        </div>
                    `;
                });
                if (belumTasks.length === 0) tasksList.innerHTML = '<p style="color:var(--text-muted); text-align:center; padding:20px;">Semua tugas sudah selesai! 🎉</p>';
            }

            // 3. Perbaikan Progress Chart (querySelector)
            if (statsData) {
                const totalTasks = taskData.length;
                const tasksSelesai = statsData.tugasSelesai || taskData.filter(t => t.status === "Selesai").length;
                const progressPct = totalTasks > 0 ? Math.round((tasksSelesai / totalTasks) * 100) : 0;

                const circle = document.querySelector('.circle');
                const pctText = document.querySelector('.percentage');
                const progressDesc = document.querySelector('.progress-text p');
                const progressTitle = document.querySelector('.progress-text h4');

                if (circle) circle.setAttribute('stroke-dasharray', `${progressPct}, 100`);
                if (pctText) pctText.textContent = `${progressPct}%`;
                if (progressDesc) progressDesc.textContent = `Kamu menyelesaikan ${tasksSelesai} dari ${totalTasks} tugas.`;
                if (progressTitle) {
                    if (progressPct >= 75) progressTitle.textContent = 'Luar Biasa! 🎉';
                    else if (progressPct >= 50) progressTitle.textContent = 'Bagus! Terus lanjutkan!';
                    else if (progressPct >= 25) progressTitle.textContent = 'Ayo semangat!';
                    else if (tasksSelesai > 0) progressTitle.textContent = 'Mulai bagus!';
                    else progressTitle.textContent = 'Mulai kerjakan!';
                }
            }
        });
    </script>

</body>

</html>
