<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remora - Selamat Datang</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="view active"
        style="background-color: var(--primary-dark); position: relative; display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; padding: 40px; overflow: hidden;">

        <div
            style="position: absolute; top: -20%; left: -50%; width: 200%; height: 60%; background-color: rgba(255,255,255,0.03); border-radius: 50%; z-index: 0;">
        </div>

        <div class="logo" style="position: relative; z-index: 1; text-align:center; margin-bottom: 60px;">
            <div style="display:inline-block;">
                <img src="./gambar/Group 31.png" alt="" width="80px">
            </div>
            <h1 style="font-size: 32px; font-weight: 800; margin-bottom: 8px;">Remora</h1>
            <p style="font-size: 14px; font-weight: 600;">Never Miss Your Task</p>
        </div>

        <div style="width: 100%; max-width: 300px; text-align:center; position: relative; z-index: 1;">
            <h2 style="font-size: 20px; font-weight: 500; margin-bottom: 8px;">Selamat Datang di Remora</h2>
            <p style="font-size: 14px; margin-bottom: 40px;">Pilih untuk melanjutkan</p>

            <a href="login.html" class="btn"
                style="background-color: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; margin-bottom:16px;">Masuk
                Ke Akun</a>
            <a href="register.html" class="btn" style="background-color: #F6F8F3; color: var(--primary-dark);">Daftar
                Baru</a>
        </div>

        <div
            style="position: absolute; bottom: 20px; left: 0; width: 100%; display:flex; justify-content:space-around; align-items:flex-end; opacity:0.1; color:#5f8a22; pointer-events:none; z-index:0;">
            <i class="fa-solid fa-bell" style="font-size: 40px; transform: rotate(-15deg); margin-bottom: 20px;"></i>
            <i class="fa-solid fa-table-cells-large" style="font-size: 80px; transform: rotate(15deg);"></i>
            <i class="fa-solid fa-file-circle-plus"
                style="font-size: 50px; transform: rotate(10deg); margin-bottom: 30px;"></i>
            <i class="fa-solid fa-chart-line"
                style="font-size: 60px; transform: rotate(-10deg); margin-bottom: 10px;"></i>
        </div>
    </div>
</body>

</html>
