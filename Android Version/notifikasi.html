<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Notifikasi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="view main-layout active">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div class="page-header">
                <div class="page-header-content">
                    <a href="dashboard.html" style="color:var(--text-main); font-size:20px; display:block; margin-bottom:20px;"><i class="fa-solid fa-arrow-left"></i></a>
                    <h1>Notifikasi</h1>
                    <p>Pantau tenggat waktu terdekat.</p>
                </div>
            </div>

            <div class="content-view active" style="margin-top:-20px; position:relative; z-index:2;">
                
                <div class="notifications-list" id="notifications-list">
                    <!-- Injected by JS -->
                </div>
            </div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="ruleEngine.js"></script>
    <script src="scripting.js"></script>
    <script src="app.js"></script>
    <script src="sidebar.js"></script>
    <script>
        window.injectSidebar('notifications');
        window.updateUserInfo();
        const result = window.initApp();
        const taskData = result.dataTersortir;

        function renderNotifications() {
            const list = document.getElementById('notifications-list');
            list.innerHTML = '';
            
            const sortedByUrgency = [...taskData].sort((a, b) => a.tenggatAngka - b.tenggatAngka);
            let count = 0;
            
            sortedByUrgency.forEach(task => {
                if (task.status === "Belum" && count < 5) {
                    let alertClass = "alert-green";
                    let iconClass = "fa-check";
                    let msg = `Kegiatan ${task.nama} dijadwalkan pada ${task.tenggatHari}.`;
                    
                    if (task.labelPrioritas === "TERLEWAT") {
                        alertClass = "alert-terlewat";
                        iconClass = "fa-skull-crossbones";
                        msg = `SANGAT BERBAHAYA! Kegiatan ${task.nama} sudah melewati tenggat waktu!`;
                    } else if (task.labelPrioritas === "Sangat Tinggi" || task.tenggatAngka <= 2) {
                        alertClass = "alert-red";
                        iconClass = "fa-triangle-exclamation";
                        msg = `SEGERA KERJAKAN! ${task.nama} tenggat waktu ${task.tenggatHari} lagi.`;
                    } else if (task.labelPrioritas === "Tinggi" || task.tenggatAngka <= 5) {
                        alertClass = "alert-yellow";
                        iconClass = "fa-clock";
                        msg = `Perhatian, ${task.nama} perlu diselesaikan dalam ${task.tenggatHari}.`;
                    } else if (task.labelPrioritas === "Sedang") {
                        alertClass = "alert-orange";
                        iconClass = "fa-list-check";
                        msg = `${task.nama} prioritas sedang, selesaikan minggu ini.`;
                    }

                    list.innerHTML += `
                        <div class="notification-item ${alertClass}">
                            <div class="notif-icon"><i class="fa-solid ${iconClass}"></i></div>
                            <div class="notif-content">
                                <h4>${task.nama}</h4>
                                <p>${msg}</p>
                                <span class="task-badge ${task.labelPrioritas === 'TERLEWAT' ? 'badge-terlewat' : task.labelPrioritas === 'Sangat Tinggi' ? 'badge-red' : task.labelPrioritas === 'Tinggi' ? 'badge-yellow' : task.labelPrioritas === 'Sedang' ? 'badge-orange' : 'badge-green'}" style="margin-top:8px; display:inline-block;">Prioritas: ${task.labelPrioritas}</span>
                            </div>
                        </div>
                    `;
                    count++;
                }
            });
            
            if (count === 0) {
                list.innerHTML = '<p style="color:var(--text-muted)">Tidak ada notifikasi saat ini.</p>';
            }
        }

        renderNotifications();
    </script>
</body>
</html>
