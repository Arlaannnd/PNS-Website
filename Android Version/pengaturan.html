<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Pengaturan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="view main-layout active">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div class="page-header" style="text-align: center; padding-bottom: 80px;">
                <div class="page-header-content">
                    <a href="dashboard.html"
                        style="color:white; font-size:20px; position: absolute; left: 24px;"><i
                            class="fa-solid fa-arrow-left"></i></a>
                    <h1 style="font-size: 20px; font-weight: 700; margin: 0; color: white;">Profil</h1>
                </div>
            </div>

            <div class="content-view active" style="margin-top:-20px; position:relative; z-index:2; padding:0 24px;">

                <!-- Profile Card -->
                <div
                    style="display: flex; flex-direction: column; align-items: center; margin-top: -60px; position: relative; z-index: 10;">
                    <div
                        style="width: 100px; height: 100px; border-radius: 50%; background-color: var(--primary-dark); border: 4px solid white; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 16px;">
                        <i class="fa-solid fa-circle-user"
                            style="font-size: 110px; color: white; margin-top: 10px;"></i>
                    </div>

                    <h2 id="settings-display-name"
                        style="font-size: 20px; font-weight: 700; color: var(--text-main); margin-bottom: 4px;">
                        Memuat...</h2>
                    <p id="settings-display-email"
                        style="font-size: 14px; color: var(--text-muted); margin-bottom: 24px;">Memuat...</p>

                    <a href="profil.html" class="btn btn-primary"
                        style="background-color: var(--primary-dark); color: white; width: 100%; border-radius: var(--radius-sm); margin-bottom: 30px;">Edit
                        Profil</a>
                </div>

                <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px;">
                    <a href="keamanan.html"
                        style="display: flex; align-items: center; gap: 16px; padding: 16px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: white; color: var(--text-main);">
                        <i class="fa-solid fa-shield-halved"
                            style="font-size: 20px; width: 24px; text-align: center;"></i>
                        <span style="font-size: 16px; font-weight: 600; flex: 1;">Kata Sandi & Keamanan</span>
                        <i class="fa-solid fa-chevron-right"
                            style="font-size: 14px; color: var(--text-muted);"></i>
                    </a>

                    <a href="pengaturan-notifikasi.html"
                        style="display: flex; align-items: center; gap: 16px; padding: 16px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: white; color: var(--text-main);">
                        <i class="fa-regular fa-bell"
                            style="font-size: 20px; width: 24px; text-align: center;"></i>
                        <span style="font-size: 16px; font-weight: 600; flex: 1;">Notifikasi</span>
                        <i class="fa-solid fa-chevron-right"
                            style="font-size: 14px; color: var(--text-muted);"></i>
                    </a>

                    <a href="bahasa.html"
                        style="display: flex; align-items: center; gap: 16px; padding: 16px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: white; color: var(--text-main);">
                        <i class="fa-solid fa-globe"
                            style="font-size: 20px; width: 24px; text-align: center;"></i>
                        <span style="font-size: 16px; font-weight: 600; flex: 1;">Bahasa</span>
                        <i class="fa-solid fa-chevron-right"
                            style="font-size: 14px; color: var(--text-muted);"></i>
                    </a>

                    <a href="faq.html"
                        style="display: flex; align-items: center; gap: 16px; padding: 16px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: white; color: var(--text-main);">
                        <i class="fa-regular fa-circle-question"
                            style="font-size: 20px; width: 24px; text-align: center;"></i>
                        <span style="font-size: 16px; font-weight: 600; flex: 1;">FAQ</span>
                        <i class="fa-solid fa-chevron-right"
                            style="font-size: 14px; color: var(--text-muted);"></i>
                    </a>

                    <a href="login.html"
                        style="display: flex; align-items: center; gap: 16px; padding: 16px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: white; color: #EF4444;">
                        <i class="fa-solid fa-arrow-right-from-bracket"
                            style="font-size: 20px; width: 24px; text-align: center;"></i>
                        <span style="font-size: 16px; font-weight: 600; flex: 1;">Keluar</span>
                        <i class="fa-solid fa-chevron-right"
                            style="font-size: 14px; color: var(--text-muted);"></i>
                    </a>
                </div>

            </div>
        </main>
    </div>

    <script src="./backend_logic/sidebar.js"></script>
    <script>
        window.injectSidebar('settings');

        // Dynamically load user name and email from localStorage (same defaults as profil.html & sidebar.js)
        const userName = localStorage.getItem('userName') || 'Subekti Rahman';
        const userEmail = localStorage.getItem('userEmail') || 'subekti@contoh.com';

        document.getElementById('settings-display-name').textContent = userName;
        document.getElementById('settings-display-email').textContent = userEmail;
    </script>
</body>

</html>
