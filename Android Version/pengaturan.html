<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remora - Pengaturan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="view main-layout active">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div class="page-header" style="text-align: center; padding-bottom: 80px;">
                <div class="page-header-content">
                    <a href="dashboard.html"
                        style="color:var(--text-main); font-size:20px; position: absolute; left: 24px;"><i
                            class="fa-solid fa-arrow-left"></i></a>
                    <h1 style="font-size: 20px; font-weight: 700; margin: 0; color: var(--text-main);">Profil</h1>
                </div>
            </div>

            <div class="content-view active" style="margin-top:-20px; position:relative; z-index:2; padding:0 24px;">

                <!-- Profile Card -->
                <div
                    style="display: flex; flex-direction: column; align-items: center; margin-top: -60px; position: relative; z-index: 10;">
                    <div id="profile-avatar-container"
                        style="width: 100px; height: 100px; border-radius: 50%; background-color: var(--primary-dark); border: 4px solid white; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 16px; position: relative;">
                        <i class="fa-solid fa-circle-user" id="profile-avatar-icon"
                            style="font-size: 110px; color: white; margin-top: 10px;"></i>
                        <img id="profile-avatar-img" src=""
                            style="width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top:0; left:0;">
                    </div>

                    <h2 id="display-name"
                        style="font-size: 18px; font-weight: 700; color: var(--text-main); margin-bottom: 4px;">-</h2>

                    <p id="display-email" style="font-size: 13px; color: var(--text-muted); margin-bottom: 16px;">-</p>

                    <a href="profil.html" class="btn btn-primary"
                        style="background-color: var(--primary-dark); color: white; width: 100%; border-radius: var(--radius-sm); margin-bottom: 30px;">Edit
                        Profil</a>
                </div>

                <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px;">
                    <a href="keamanan.html"
                        style="display: flex; align-items: center; gap: 16px; padding: 16px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: white; color: var(--text-main);">
                        <i class="fa-solid fa-shield-halved"
                            style="font-size: 20px; width: 24px; text-align: center;"></i>
                        <span style="font-size: 16px; font-weight: 600; flex: 1;">Kata Sandi & Keamanan</span>
                        <i class="fa-solid fa-chevron-right" style="font-size: 14px; color: var(--text-muted);"></i>
                    </a>

                    <a href="pengaturan-notifikasi.html"
                        style="display: flex; align-items: center; gap: 16px; padding: 16px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: white; color: var(--text-main);">
                        <i class="fa-regular fa-bell" style="font-size: 20px; width: 24px; text-align: center;"></i>
                        <span style="font-size: 16px; font-weight: 600; flex: 1;">Notifikasi</span>
                        <i class="fa-solid fa-chevron-right" style="font-size: 14px; color: var(--text-muted);"></i>
                    </a>

                    <a href="bahasa.html"
                        style="display: flex; align-items: center; gap: 16px; padding: 16px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: white; color: var(--text-main);">
                        <i class="fa-solid fa-globe" style="font-size: 20px; width: 24px; text-align: center;"></i>
                        <span style="font-size: 16px; font-weight: 600; flex: 1;">Bahasa</span>
                        <i class="fa-solid fa-chevron-right" style="font-size: 14px; color: var(--text-muted);"></i>
                    </a>

                    <a href="faq.html"
                        style="display: flex; align-items: center; gap: 16px; padding: 16px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: white; color: var(--text-main);">
                        <i class="fa-regular fa-circle-question"
                            style="font-size: 20px; width: 24px; text-align: center;"></i>
                        <span style="font-size: 16px; font-weight: 600; flex: 1;">FAQ</span>
                        <i class="fa-solid fa-chevron-right" style="font-size: 14px; color: var(--text-muted);"></i>
                    </a>

                    <a href="login.html"
                        style="display: flex; align-items: center; gap: 16px; padding: 16px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: white; color: #EF4444;">
                        <i class="fa-solid fa-arrow-right-from-bracket"
                            style="font-size: 20px; width: 24px; text-align: center;"></i>
                        <span style="font-size: 16px; font-weight: 600; flex: 1;">Keluar</span>
                        <i class="fa-solid fa-chevron-right" style="font-size: 14px; color: var(--text-muted);"></i>
                    </a>
                </div>

            </div>
        </main>
    </div>

    <script src="./database/authService.js"></script>
    <script src="./backend_logic/data.js"></script>
    <script src="./backend_logic/ruleEngine.js"></script>
    <script src="./backend_logic/scripting.js"></script>
    <script src="./backend_logic/app.js"></script>
    <script src="./backend_logic/sidebar.js"></script>
    <script>
        window.injectSidebar('settings');

        const storedAvatar = localStorage.getItem('userAvatar');
        if (storedAvatar) {
            document.getElementById('profile-avatar-icon').style.display = 'none';
            document.getElementById('profile-avatar-img').src = storedAvatar;
            document.getElementById('profile-avatar-img').style.display = 'block';
        }

        const localName = localStorage.getItem('userName') || '';
        const localEmail = localStorage.getItem('userEmail') || '';
        if (localName) document.getElementById('display-name').textContent = localName;
        if (localEmail) document.getElementById('display-email').textContent = localEmail;

        window.updateUserInfo();

        window.initApp().then(async (result) => {
            try {
                const { data: profile } = await window.authService.getProfile();
                if (profile) {
                    const emailReal = profile.email || '';
                    const namaDariEmail = emailReal.split('@')[0];

                    let namaReal = profile.namalengkap || '';
                    const namaAbaikan = ["User", "Pengguna Baru", "Subekti Rahman", "Subekti", null, undefined, ""];

                    if (namaAbaikan.includes(namaReal) || !namaReal) {
                        namaReal = namaDariEmail;
                    }

                    document.getElementById('display-name').textContent = namaReal;
                    document.getElementById('display-email').textContent = emailReal;

                    window.updateUserInfo();
                }
            } catch (err) {
                console.error("Gagal menyinkronkan profil secara online:", err);
            }
        });

        function openSubpage(name) { document.getElementById('subpage-' + name)?.classList.add('show'); }
        function closeSubpage(name) { document.getElementById('subpage-' + name)?.classList.remove('show'); }
        document.querySelectorAll('.subpage-overlay').forEach(ov => {
            ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('show'); });
        });

        document.getElementById('securityForm').addEventListener('submit', function (e) {
            e.preventDefault();
            if (document.getElementById('new-password').value !== document.getElementById('confirm-password').value) { alert('Kata sandi tidak cocok!'); return; }
            alert('Kata sandi berhasil diperbarui!');
            this.reset(); closeSubpage('keamanan');
        });

        document.querySelectorAll('.language-option input[type="radio"]').forEach(r => {
            r.addEventListener('change', function () {
                document.querySelectorAll('.language-option').forEach(o => o.classList.remove('selected'));
                this.closest('.language-option').classList.add('selected');
            });
        });

        document.getElementById('btn-save-lang').addEventListener('click', function () {
            localStorage.setItem('appLanguage', document.querySelector('input[name="language"]:checked').value);
            alert('Bahasa berhasil disimpan!'); closeSubpage('bahasa');
        });

        function filterFAQ(query) {
            const q = query.toLowerCase().trim();
            document.querySelectorAll('#subpage-faq .faq-item').forEach(item => {
                const questionText = item.querySelector('.faq-question span:not(.faq-icon)').textContent.toLowerCase();
                const answerText = item.querySelector('.faq-answer').textContent.toLowerCase();
                item.style.display = (q === '' || questionText.includes(q) || answerText.includes(q)) ? '' : 'none';
            });
            document.querySelectorAll('.faq-category').forEach(cat => {
                const visibleItems = cat.querySelectorAll('.faq-item:not([style*="display: none"])');
                cat.style.display = visibleItems.length > 0 ? '' : 'none';
            });
        }
    </script>
</body>

</html>
