<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Edit Profil</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="view main-layout active">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div class="page-header" style="text-align: center; padding-bottom: 40px; background-color: var(--bg-color);">
                <div class="page-header-content">
                    <a href="pengaturan.html" style="color:var(--text-main); font-size:20px; position: absolute; left: 24px;"><i class="fa-solid fa-arrow-left"></i></a>
                    <h1 style="font-size: 20px; font-weight: 700; margin: 0; color: var(--text-main);">Edit Profil</h1>
                </div>
            </div>
            <div class="content-view active" style="padding:0 24px; margin-top: 20px;">
                <div class="settings-form" style="background: transparent; box-shadow: none; padding: 0;">
                    <div class="profile-header" style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
                        <div class="avatar-large" style="width: 80px; height: 80px; background: #6B7280; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                            <i class="fa-solid fa-user" style="font-size: 40px; color: white; margin-top: 10px;"></i>
                        </div>
                        <button class="btn btn-outline" style="width: auto; padding: 8px 16px; font-size: 14px; border-radius: var(--radius-sm); font-weight: 600; border-color: #E5E7EB;">Ubah Foto</button>
                    </div>
                    <form id="settingsForm">
                        <div class="form-group" style="margin-bottom: 16px;">
                            <label style="font-size: 14px; font-weight: 600; color: #111827;">Nama Lengkap (Full Name)</label>
                            <input type="text" id="profile-name-input" value="Subekti Rahman" style="background: white; border-color: #E5E7EB;">
                        </div>
                        <div class="form-group" style="margin-bottom: 16px;">
                            <label style="font-size: 14px; font-weight: 600; color: #111827;">Nama Panggilan (Nickname)</label>
                            <input type="text" id="profile-nickname-input" value="" style="background: white; border-color: #E5E7EB;">
                        </div>
                        <div class="form-group" style="margin-bottom: 16px;">
                            <label style="font-size: 14px; font-weight: 600; color: #111827;">Email</label>
                            <input type="email" id="profile-email-input" value="" style="background: white; border-color: #E5E7EB;">
                        </div>
                        <div class="form-group" style="margin-bottom: 16px;">
                            <label style="font-size: 14px; font-weight: 600; color: #111827;">Jenis Kelamin (Gender)</label>
                            <select id="profile-gender-input" style="background: white; border-color: #E5E7EB;">
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 24px;">
                            <label style="font-size: 14px; font-weight: 600; color: #111827;">Zona Waktu (Timezone)</label>
                            <select id="profile-timezone-input" style="background: white; border-color: #E5E7EB;">
                                <option value="WIB">WIB (Waktu Indonesia Barat)</option>
                                <option value="WITA">WITA (Waktu Indonesia Tengah)</option>
                                <option value="WIT">WIT (Waktu Indonesia Timur)</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: auto; background-color: #164e29; border-radius: var(--radius-sm); padding: 12px 24px; font-weight: 600;">Simpan Perubahan</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="sidebar.js"></script>
    <script>
        window.injectSidebar('settings');
        // Initial setup from localStorage if exists, or defaults
        const storedName = localStorage.getItem('userName') || 'Subekti Rahman';
        const storedNickname = localStorage.getItem('userNickname') || 'Subekti';
        const storedEmail = localStorage.getItem('userEmail') || 'subekti@contoh.com';
        const storedGender = localStorage.getItem('userGender') || 'Laki-laki';
        const storedTimezone = localStorage.getItem('userTimezone') || 'WIB';

        document.getElementById('profile-name-input').value = storedName;
        document.getElementById('profile-nickname-input').value = storedNickname;
        document.getElementById('profile-email-input').value = storedEmail;
        document.getElementById('profile-gender-input').value = storedGender;
        document.getElementById('profile-timezone-input').value = storedTimezone;

        document.getElementById('settingsForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const name = document.getElementById('profile-name-input').value;
            const nickname = document.getElementById('profile-nickname-input').value;
            const email = document.getElementById('profile-email-input').value;
            const gender = document.getElementById('profile-gender-input').value;
            const timezone = document.getElementById('profile-timezone-input').value;

            localStorage.setItem('userName', name);
            localStorage.setItem('userNickname', nickname);
            localStorage.setItem('userEmail', email);
            localStorage.setItem('userGender', gender);
            localStorage.setItem('userTimezone', timezone);

            alert('Pengaturan profil berhasil disimpan!');
            window.location.href = 'pengaturan.html';
        });
    </script>
</body>
</html>
