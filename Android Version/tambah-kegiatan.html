<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remora - Tambah Kegiatan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="view main-layout active">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div class="page-header">
                <div class="page-header-content">
                    <h1><a href="dashboard.html" style="color:var(--text-main); font-size:20px;"><i
                                class="fa-solid fa-arrow-left" style="margin-right: 20px;"></i></a>
                        Tambah Kegiatan</h1>
                    <p style="margin-left:45px;">Buat Kegiatan Baru.</p>
                </div>
            </div>

            <div class="content-view active" style="margin-top:-20px; position:relative; z-index:2; padding:0 24px;">
                <div class="add-task-layout">
                    <div class="add-task-form-area">

                        <form id="add-task-form">
                            <div class="form-group" style="padding-top: 40px;">
                                <label>Nama Kegiatan</label>
                                <input type="text" id="task-name" required>
                            </div>
                            <div class="form-group">
                                <label>Kategori</label>
                                <div class="select-wrapper">
                                    <select id="task-category">
                                        <option value="">Pilih Kategori</option>
                                        <option value="UAS">UAS / UTS</option>
                                        <option value="Tugas">Tugas</option>
                                        <option value="Organisasi">Organisasi</option>
                                        <option value="Kegiatan eksternal">Kegiatan Eksternal</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group row-group">
                                <div class="col">
                                    <label>Deadline</label>
                                    <div class="input-with-icon">
                                        <input type="date" id="task-date" style="padding: 15px">
                                    </div>
                                </div>
                                <div class=" col">
                                    <label>&nbsp;</label>
                                    <div class="input-with-icon">
                                        <input type="time" id="task-time" style="padding: 15px">
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <div class="col">
                                    <label>Jenis Kegiatan</label>
                                    <div class="select-wrapper">
                                        <select id="task-type">
                                            <option value="Individu">Individu</option>
                                            <option value="Kelompok">Kelompok</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Tingkat Kesulitan</label>
                                <div class="select-wrapper">
                                    <select id="task-diff">
                                        <option value="1">1</option>
                                        <option value="2">2</option>
                                        <option value="3" selected>3</option>
                                        <option value="4">4</option>
                                        <option value="5">5</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Pernah Terlambat?</label>
                                <div class="select-wrapper">
                                    <select id="task-late">
                                        <option value="Tidak">Tidak</option>
                                        <option value="Iya">Iya</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Catatan (Opsional)</label>
                                <textarea id="task-notes" placeholder="Tambahkan catatan..." rows="4"
                                    style="width: 100%; padding: 14px 16px; border: 1px solid #d1d5db; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 14px; background: transparent; resize: vertical;"></textarea>
                            </div>

                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary flex-1">Simpan Kegiatan</button>
                                <a href="dashboard.html" class="btn btn-outline">Batal</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="./database/authService.js"></script>
    <script src="./backend_logic/data.js"></script>
    <script src="./backend_logic/ruleEngine.js"></script>
    <script src="./backend_logic/scripting.js"></script>
    <script src="./backend_logic/app.js"></script>
    <script src="./backend_logic/sidebar.js"></script>
    <script>
        window.injectSidebar('add-task');
        window.updateUserInfo();

        document.getElementById('add-task-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nama = document.getElementById('task-name').value;
            const kategori = document.getElementById('task-category').value;
            const dateInput = document.getElementById('task-date').value;
            const jenisInput = document.getElementById('task-type').value;
            const kesulitanInput = parseInt(document.getElementById('task-diff').value);
            const riwayatInput = document.getElementById('task-late').value;

            if (!dateInput) {
                alert("Mohon isi tanggal deadline!");
                return;
            }

            try {
                const supabase = await window.authService.getSupabase();

                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    alert("Sesi habis, silakan login ulang!");
                    return;
                }

                const { error } = await supabase.from('kegiatan').insert([
                    {
                        user_id: session.user.id,
                        nama_kegiatan: nama,
                        kategori: kategori || "Tugas",
                        tenggat_waktu: dateInput,
                        jenis_kegiatan: jenisInput,
                        tingkat_kesulitan: kesulitanInput,
                        pernah_terlambat: riwayatInput,
                        status: "Belum"
                    }
                ]);

                if (error) throw error;

                alert('Kegiatan berhasil ditambahkan ke database online!');
                window.location.href = 'dashboard.html';

            } catch (err) {
                alert("Gagal menyimpan kegiatan: " + err.message);
                console.error(err);
            }
        });
    </script>
</body>

</html>
