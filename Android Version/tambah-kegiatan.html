<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Tambah Kegiatan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="view main-layout active">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div class="page-header">
                <div class="page-header-content">
                    <a href="dashboard.html" style="color:var(--text-main); font-size:20px; display:block; margin-bottom:20px;"><i class="fa-solid fa-arrow-left"></i></a>
                    <h1>Tambah Kegiatan</h1>
                    <p>Buat Kegiatan Baru.</p>
                </div>
            </div>

            <div class="content-view active" style="margin-top:-20px; position:relative; z-index:2; padding:0 24px;">
                <div class="add-task-layout">
                    <div class="add-task-form-area">
                        
                        <form id="add-task-form">
                            <div class="form-group">
                                <label>Nama Kegiatan</label>
                                <input type="text" id="task-name" required>
                            </div>
                            <div class="form-group">
                                <label>Kategori</label>
                                <div class="select-wrapper">
                                    <select id="task-category">
                                        <option value="">Pilih Kategori</option>
                                        <option value="UAS">UAS / UTS</option>
                                        <option value="Tugas">Tugas</option>
                                        <option value="Organisasi">Organisasi</option>
                                        <option value="Kegiatan eksternal">Kegiatan Eksternal</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group row-group">
                                <div class="col">
                                    <label>Deadline</label>
                                    <div class="input-with-icon">
                                        <i class="fa-regular fa-calendar"></i>
                                        <input type="date" id="task-date">
                                    </div>
                                </div>
                                <div class="col">
                                    <label>&nbsp;</label>
                                    <div class="input-with-icon">
                                        <i class="fa-regular fa-clock"></i>
                                        <input type="time" id="task-time">
                                    </div>
                                </div>
                            </div>

                            <div class="form-group">
                                <div class="col">
                                    <label>Jenis Kegiatan</label>
                                    <div class="select-wrapper">
                                        <select id="task-type">
                                            <option value="Individu">Individu</option>
                                            <option value="Kelompok">Kelompok</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label>Tingkat Kesulitan</label>
                                <div class="select-wrapper">
                                    <select id="task-diff">
                                        <option value="1">1</option>
                                        <option value="2">2</option>
                                        <option value="3" selected>3</option>
                                        <option value="4">4</option>
                                        <option value="5">5</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label>Pernah Terlambat?</label>
                                <div class="select-wrapper">
                                    <select id="task-late">
                                        <option value="Tidak">Tidak</option>
                                        <option value="Iya">Iya</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Catatan (Opsional)</label>
                                <textarea id="task-notes" placeholder="Tambahkan catatan..." rows="4" style="width: 100%; padding: 14px 16px; border: 1px solid #d1d5db; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: 14px; background: transparent; resize: vertical;"></textarea>
                            </div>
                            
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary flex-1">Simpan Kegiatan</button>
                                <a href="dashboard.html" class="btn btn-outline">Batal</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="./backend_logic/sidebar.js"></script>
    <script src="./backend_logic/ruleEngine.js"></script>
    <script>
        window.injectSidebar('add-task');
        window.updateUserInfo();

        // Edit mode detection
        const editTaskId = localStorage.getItem('editTaskId');
        let editingTask = null;

        if (editTaskId) {
            const currentData = JSON.parse(localStorage.getItem('taskData') || '[]');
            editingTask = currentData.find(t => t.id === parseInt(editTaskId));
            localStorage.removeItem('editTaskId');

            if (editingTask) {
                // Update page title
                document.querySelector('.page-header h1').textContent = 'Edit Kegiatan';
                document.querySelector('.page-header p').textContent = 'Ubah detail kegiatan.';
                document.querySelector('#add-task-form button[type="submit"]').textContent = 'Simpan Perubahan';

                // Pre-fill form
                document.getElementById('task-name').value = editingTask.nama;
                document.getElementById('task-category').value = editingTask.kategori;
                document.getElementById('task-type').value = editingTask.jenis;
                document.getElementById('task-diff').value = editingTask.tingkatKesulitan;
                document.getElementById('task-late').value = editingTask.riwayatTerlambat;

                // Calculate date from tenggatAngka
                if (editingTask.tenggatAngka !== undefined) {
                    const deadline = new Date();
                    deadline.setDate(deadline.getDate() + editingTask.tenggatAngka);
                    document.getElementById('task-date').value = deadline.toISOString().split('T')[0];
                }
            }
        }
        
        document.getElementById('add-task-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const nama = document.getElementById('task-name').value;
            const kategori = document.getElementById('task-category').value;
            const dateInput = document.getElementById('task-date').value;
            
            const jenisInput = document.getElementById('task-type').value;
            const kesulitanInput = parseInt(document.getElementById('task-diff').value);
            const riwayatInput = document.getElementById('task-late').value;
            
            let tenggatAngka = 7;
            if (dateInput) {
                const targetDate = new Date(dateInput);
                const today = new Date();
                const diffTime = targetDate - today;
                tenggatAngka = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            }

            let currentData = JSON.parse(localStorage.getItem('taskData') || '[]');

            if (editingTask) {
                // Update existing task
                const taskIndex = currentData.findIndex(t => t.id === editingTask.id);
                if (taskIndex > -1) {
                    currentData[taskIndex].nama = nama;
                    currentData[taskIndex].jenis = jenisInput;
                    currentData[taskIndex].kategori = kategori || "Tugas";
                    currentData[taskIndex].tenggatAngka = tenggatAngka;
                    currentData[taskIndex].tingkatKesulitan = kesulitanInput;
                    currentData[taskIndex].riwayatTerlambat = riwayatInput;

                    if (window.hitungPrioritas) {
                        const hasil = window.hitungPrioritas(currentData[taskIndex]);
                        currentData[taskIndex].skorPrioritas = hasil.skor;
                        currentData[taskIndex].labelPrioritas = hasil.label;
                    }
                }
                localStorage.setItem('taskData', JSON.stringify(currentData));
                alert('Kegiatan berhasil diperbarui! Prioritas: ' + (currentData[taskIndex]?.labelPrioritas || '...'));
            } else {
                // Add new task
                const newTask = {
                    id: Date.now(),
                    nama: nama,
                    jenis: jenisInput,
                    kategori: kategori || "Tugas",
                    tenggatAngka: tenggatAngka,
                    bebanSKS: 2,
                    tingkatKesulitan: kesulitanInput,
                    riwayatTerlambat: riwayatInput,
                    hariSelesai: null,
                    status: "Belum"
                };

                if (window.hitungPrioritas) {
                    const hasil = window.hitungPrioritas(newTask);
                    newTask.skorPrioritas = hasil.skor;
                    newTask.labelPrioritas = hasil.label;
                }

                currentData.push(newTask);
                
                if (!localStorage.getItem('firstTaskDate')) {
                    localStorage.setItem('firstTaskDate', new Date().toISOString());
                }
                localStorage.setItem('taskData', JSON.stringify(currentData));
                alert('Kegiatan berhasil ditambahkan! Prioritas dihitung: ' + (newTask.labelPrioritas || '...'));
            }
            
            window.location.href = 'semua-kegiatan.html';
        });
    </script>
</body>
</html>
