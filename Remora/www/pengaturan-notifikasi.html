<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remora - Pengaturan Notifikasi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .notif-list {
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm)
        }

        .notif-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-color)
        }

        .notif-row:last-child {
            border-bottom: none
        }

        .notif-text h4 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 3px
        }

        .notif-text p {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4
        }

        .tog {
            position: relative;
            width: 50px;
            height: 28px;
            background: #D1D5DB;
            border-radius: 14px;
            cursor: pointer;
            border: none;
            padding: 0;
            transition: background .3s;
            flex-shrink: 0
        }

        .tog.on {
            background: var(--primary-dark)
        }

        .tog::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            transition: transform .3s;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .2)
        }

        .tog.on::after {
            transform: translateX(22px)
        }
    </style>
</head>

<body>
    <div class="view main-layout active">
        <div id="sidebar-container"></div>
        <main class="main-content">
            <div class="page-header" style="text-align:center;padding-bottom:40px;background-color:var(--bg-color);">
                <div class="page-header-content">
                    <a href="pengaturan.html"
                        style="color:var(--text-main);font-size:20px;position:absolute;left:24px;"><i
                            class="fa-solid fa-arrow-left"></i></a>
                    <h1 style="font-size:20px;font-weight:700;margin:0;color:var(--text-main);">Pengaturan Notifikasi
                    </h1>
                </div>
            </div>
            <div class="content-view active" style="padding:0 24px;margin-top:10px;">
                <div class="notif-list">
                    <div class="notif-row">
                        <div class="notif-text">
                            <h4>Notifikasi Deadline</h4>
                            <p>Pemberitahuan saat tugas mendekati tenggat waktu</p>
                        </div>
                        <button class="tog on" id="t-deadline" onclick="togSave(this)"></button>
                    </div>
                    <div class="notif-row">
                        <div class="notif-text">
                            <h4>Notifikasi Prioritas</h4>
                            <p>Pemberitahuan saat ada tugas prioritas tinggi</p>
                        </div>
                        <button class="tog on" id="t-prioritas" onclick="togSave(this)"></button>
                    </div>
                    <div class="notif-row">
                        <div class="notif-text">
                            <h4>Ringkasan Mingguan</h4>
                            <p>Ringkasan produktivitas setiap minggu</p>
                        </div>
                        <button class="tog" id="t-weekly" onclick="togSave(this)"></button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="./database/authService.js"></script>
    <script src="./backend_logic/data.js"></script>
    <script src="./backend_logic/ruleEngine.js"></script>
    <script src="./backend_logic/scripting.js"></script>
    <script src="./backend_logic/app.js"></script>
    <script src="./backend_logic/sidebar.js"></script>
    <script>
        window.injectSidebar('settings');

        async function loadSettings() {
            const { data: profile } = await window.authService.getProfile();
            if (profile) {
                if (profile.t_deadline !== undefined) {
                    const el = document.getElementById('t-deadline');
                    if (profile.t_deadline) el.classList.add('on'); else el.classList.remove('on');
                }
                if (profile.t_prioritas !== undefined) {
                    const el = document.getElementById('t-prioritas');
                    if (profile.t_prioritas) el.classList.add('on'); else el.classList.remove('on');
                }
            }
            // t-weekly keeping local storage for now as it may not be in DB
            const v = localStorage.getItem('t-weekly');
            if (v === 'true') document.getElementById('t-weekly').classList.add('on');
            else if (v === 'false') document.getElementById('t-weekly').classList.remove('on');
        }

        loadSettings();

        async function togSave(el) {
            el.classList.toggle('on');
            const isOn = el.classList.contains('on');
            if (el.id === 't-deadline') {
                await window.authService.updateProfile({ t_deadline: isOn });
            } else if (el.id === 't-prioritas') {
                await window.authService.updateProfile({ t_prioritas: isOn });
            } else {
                localStorage.setItem(el.id, isOn);
            }
        }
    </script>
</body>

</html>
