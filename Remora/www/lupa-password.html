<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remora - Lupa Password</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .view {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .view::-webkit-scrollbar {
            display: none;
        }

        .auth-body .form-group input {
            border-radius: 24px;
            padding: 14px 20px;
            border: 1px solid #E5E7EB;
            background: white;
        }

        .auth-body .btn-primary {
            border-radius: var(--radius-md);
            padding: 16px;
            font-size: 14px;
        }
    </style>
</head>

<body style="visibility: visible; opacity: 1; transition: opacity 0.3s ease; background-color: var(--primary-dark);">
    <div class="view active" style="overflow-y: auto;">
        <div class="auth-container" style="display: block; height: auto; min-height: 100%;">
            <div class="auth-header">
                <a href="login.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
                <div class="logo">
                    <div style="display:inline-block; position:relative; width:70px; height:70px;">
                        <img src="./gambar/Group 31.png" alt="" width="70px">
                    </div>
                    <h1>Remora</h1>
                    <p>Never Miss Your Task</p>
                </div>
            </div>
            <div class="auth-body" style="position: relative; overflow: visible; min-height: calc(100vh - 200px);">
                <div class="auth-form-container" style="position: relative; z-index: 2;">
                    <h2>Lupa Password</h2>
                    <p class="subtitle" style="margin-bottom: 24px; line-height: 1.5;">Masukkan email yang terdaftar
                        untuk<br>mengatur ulang kata sandi Anda.</p>

                    <form id="forgotPasswordForm">
                        <div class="form-group" style="margin-bottom: 24px;">
                            <label
                                style="font-size: 14px; font-weight: 700; color: #1C1C1C; margin-bottom: 12px;">Email</label>
                            <input type="email" id="email" placeholder="contoh@gmail.com" required>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block" style="margin-bottom: 40px;">Kirim Tautan</button>
                    </form>

                    <div style="text-align: center;">
                        <a href="login.html"
                            style="color: var(--primary-light); font-weight: 600; font-size: 14px;">Kembali ke Masuk</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="./database/authService.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = 'Memproses...';
            btn.disabled = true;

            const { data, error } = await window.authService.sendPasswordResetOtp(email);

            if (error) {
                alert('Gagal mengirim tautan/kode: ' + error);
                btn.textContent = originalText;
                btn.disabled = false;
            } else {
                localStorage.setItem('resetEmail', email);
                window.location.href = 'verifikasi-email.html';
            }
        });
    </script>
</body>

</html>
