<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remora - Ganti Password</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .view {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .view::-webkit-scrollbar {
            display: none;
        }

        .auth-body .form-group input,
        .auth-body .form-group .input-with-icon input {
            border-radius: 24px;
            padding: 14px 20px;
            border: 1px solid #E5E7EB;
            background: white;
        }

        .auth-body .input-with-icon input {
            padding-right: 48px;
        }

        .auth-body .input-with-icon i {
            right: 20px;
        }

        .auth-body .btn-primary {
            border-radius: 24px;
            padding: 16px;
            font-size: 14px;
        }
        
        .form-group label {
            font-size: 14px;
            font-weight: 700;
            color: #1C1C1C;
            margin-bottom: 12px;
        }
    </style>
</head>

<body style="visibility: visible; opacity: 1; transition: opacity 0.3s ease; background-color: var(--primary-dark);">
    <div class="view active" style="overflow-y: auto;">
        <div class="auth-container" style="display: block; height: auto; min-height: 100%;">
            <div class="auth-header">
                <a href="verifikasi-email.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
                <div class="logo">
                    <div style="display:inline-block; position:relative; width:70px; height:70px;">
                        <img src="./gambar/Group 31.png" alt="" width="70px">
                    </div>
                    <h1>Remora</h1>
                    <p>Never Miss Your Task</p>
                </div>
            </div>
            <div class="auth-body" style="position: relative; overflow: visible; min-height: calc(100vh - 200px);">
                <div class="auth-form-container" style="position: relative; z-index: 2;">
                    <h2>Ganti Password</h2>
                    <p class="subtitle" style="margin-bottom: 32px; line-height: 1.5;">Masukkan kata sandi baru Anda untuk<br>mengamankan akun.</p>

                    <form id="resetPasswordForm">
                        <div class="form-group" style="margin-bottom: 24px;">
                            <label>Password Baru</label>
                            <div class="input-with-icon">
                                <input type="password" id="newPassword" placeholder="Masukkan password baru" required>
                                <i class="fa-solid fa-eye show-pwd" style="cursor:pointer; pointer-events:auto; z-index:10; color: #9CA3AF;" onclick="togglePwd(this)"></i>
                            </div>
                        </div>

                        <div class="form-group" style="margin-bottom: 40px;">
                            <label>Konfirmasi Password</label>
                            <div class="input-with-icon">
                                <input type="password" id="confirmPassword" placeholder="Ulangi password baru" required>
                                <i class="fa-solid fa-eye-slash show-pwd" style="cursor:pointer; pointer-events:auto; z-index:10; color: #9CA3AF;" onclick="togglePwd(this)"></i>
                            </div>
                            <p id="passwordError" style="color: var(--priority-red); font-size: 12px; margin-top: 8px; display: none;">Password tidak cocok</p>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-block" style="margin-bottom: 24px;">Ganti Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="./database/authService.js"></script>
    <script>
        // Toggle Password Visibility Function
        function togglePwd(icon) {
            const input = icon.parentElement.querySelector('input');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }

        // Form Submission to update password
        document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('passwordError');

            if (newPassword !== confirmPassword) {
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';
            
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = 'Menyimpan...';
            btn.disabled = true;

            const { data, error } = await window.authService.updateUserPassword(newPassword);

            if (error) {
                alert('Gagal mengganti password: ' + error);
                btn.textContent = originalText;
                btn.disabled = false;
            } else {
                // Clear state, sign out so the user must log in with new password
                localStorage.removeItem('resetEmail');
                await window.authService.signOut();
                alert('Password berhasil diubah. Silakan masuk kembali.');
                window.location.href = 'login.html';
            }
        });
    </script>
</body>

</html>
